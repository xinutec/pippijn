---
apiVersion: apps/v1
kind: Deployment
metadata:
  namespace: nextcloud
  name: nextcloud-db
  labels:
    app: nextcloud
spec:
  selector:
    matchLabels:
      pod-label: nextcloud-db-pod
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        pod-label: nextcloud-db-pod
    spec:
      containers:
      # dev-lint: allow-unhardened — the mariadb entrypoint starts as root to
      # fix datadir ownership/permissions, then drops to the mysql user itself;
      # forcing runAsNonRoot breaks first-boot init on the PVC.
      - name: mariadb
        image: mariadb:11.8
        env:
        - name: MYSQL_DATABASE
          value: nextcloud
        # Root password comes from MYSQL_ROOT_PASSWORD in nextcloud-db-secret
        # (via envFrom below). Only applied on a fresh datadir; the running DB's
        # root password is set directly. Previously MARIADB_ALLOW_EMPTY_ROOT_PASSWORD.
        envFrom:
        - secretRef:
            name: nextcloud-db-secret
        volumeMounts:
        - name: db-storage
          mountPath: /var/lib/mysql
          subPath: mariadb-data
        resources:
          requests:
            cpu: 500m
            memory: 1Gi
        livenessProbe:
          exec:
            command: ["mariadb-admin", "ping"]
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
        readinessProbe:
          # Authenticate as the app user (creds from the secret) rather than
          # passwordless root, so the probe keeps working once root has a password.
          exec:
            command:
            - sh
            - -c
            - 'MYSQL_PWD="$MYSQL_PASSWORD" mariadb -h 127.0.0.1 -u "$MYSQL_USER" -e "SELECT 1"'
          initialDelaySeconds: 5
          periodSeconds: 10
          timeoutSeconds: 5
      volumes:
      - name: db-storage
        persistentVolumeClaim:
          claimName: nextcloud-storage
---
apiVersion: v1
kind: Service
metadata:
  namespace: nextcloud
  name: nextcloud-db
  labels:
    app: nextcloud
spec:
  clusterIP: None
  selector:
    pod-label: nextcloud-db-pod
  ports:
  - protocol: TCP
    port: 3306
