---
apiVersion: apps/v1
kind: Deployment
metadata:
  namespace: nextcloud
  name: nextcloud-db
  labels:
    app: nextcloud
spec:
  selector:
    matchLabels:
      pod-label: nextcloud-db-pod
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        pod-label: nextcloud-db-pod
    spec:
      containers:
      - name: mariadb
        image: mariadb:11.8
        env:
        - name: MYSQL_DATABASE
          value: nextcloud
        - name: MARIADB_ALLOW_EMPTY_ROOT_PASSWORD
          value: "1"
        envFrom:
        - secretRef:
            name: nextcloud-db-secret
        volumeMounts:
        - name: db-storage
          mountPath: /var/lib/mysql
          subPath: mariadb-data
        resources:
          requests:
            cpu: 500m
            memory: 1Gi
        livenessProbe:
          exec:
            command: ["mariadb-admin", "ping"]
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
        readinessProbe:
          exec:
            command: ["mariadb", "-h", "127.0.0.1", "-e", "SELECT 1"]
          initialDelaySeconds: 5
          periodSeconds: 10
          timeoutSeconds: 5
      volumes:
      - name: db-storage
        persistentVolumeClaim:
          claimName: nextcloud-storage
---
apiVersion: v1
kind: Service
metadata:
  namespace: nextcloud
  name: nextcloud-db
  labels:
    app: nextcloud
spec:
  clusterIP: None
  selector:
    pod-label: nextcloud-db-pod
  ports:
  - protocol: TCP
    port: 3306
