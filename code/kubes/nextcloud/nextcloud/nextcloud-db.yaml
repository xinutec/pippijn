---
# dev-lint: allow-no-netpol — pre-existing: namespace needs a default-deny NetworkPolicy + allow-graph (network-hardening)
apiVersion: apps/v1
# dev-lint: allow-no-netpol
kind: Deployment
metadata:
  namespace: nextcloud
  name: nextcloud-db
  labels:
    app: nextcloud
spec:
  selector:
    matchLabels:
      pod-label: nextcloud-db-pod
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        pod-label: nextcloud-db-pod
    spec:
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      containers:
      # dev-lint: allow-unhardened — the mariadb entrypoint starts as root to
      # fix datadir ownership/permissions, then drops to the mysql user itself;
      # forcing runAsNonRoot breaks first-boot init on the PVC.
      # dev-lint: allow-no-mem-limit — pre-existing (fix: size from kubectl top)
      - name: mariadb
        # 12.3 is the current LTS (GA 2026-05-28, supported to Jun 2029). MariaDB has
        # no downgrade path; a verified app-user dump of the nextcloud schema is taken
        # before every bump (root pw here diverges from the secret, so root can't dump).
        image: mariadb:12.3
        env:
        # Migrate the system tables on first start after a major bump. The auto-upgrade
        # runs against a --skip-grant-tables temp server, so the root-pw divergence does
        # not affect it; the startupProbe above keeps liveness from killing it mid-run.
        - name: MARIADB_AUTO_UPGRADE
          value: "1"
        - name: MYSQL_DATABASE
          value: nextcloud
        # Root password comes from MYSQL_ROOT_PASSWORD in nextcloud-db-secret
        # (via envFrom below). Only applied on a fresh datadir; the running DB's
        # root password is set directly. Previously MARIADB_ALLOW_EMPTY_ROOT_PASSWORD.
        envFrom:
        - secretRef:
            name: nextcloud-db-secret
        volumeMounts:
        - name: db-storage
          mountPath: /var/lib/mysql
          subPath: mariadb-data
        resources:
          requests:
            cpu: 500m
            memory: 1Gi
        # This DB is ~1.2 GB on disk. When its image is bumped to a new major
        # version, MARIADB_AUTO_UPGRADE starts the server, runs mariadb-upgrade,
        # then shuts it down and restarts it. That internal restart lands after
        # the liveness initialDelaySeconds and the server is briefly down, so
        # liveness fails 3x and kubelet SIGKILLs the container mid-upgrade
        # (observed on health-db, 4 GB, and life-db, 175 MB, on 2026-07-22/23 --
        # size did not matter, timing did). A startupProbe holds liveness off
        # until the server actually answers, giving startup up to 10 minutes
        # while steady-state liveness stays strict. This is in place BEFORE the
        # version bump so the eventual upgrade cannot be killed for being slow.
        startupProbe:
          exec:
            command: ["mariadb-admin", "ping"]
          periodSeconds: 10
          failureThreshold: 60
          timeoutSeconds: 5
        livenessProbe:
          exec:
            command: ["mariadb-admin", "ping"]
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
        readinessProbe:
          # Authenticate as the app user (creds from the secret) rather than
          # passwordless root, so the probe keeps working once root has a password.
          exec:
            command:
            - sh
            - -c
            - 'MYSQL_PWD="$MYSQL_PASSWORD" mariadb -h 127.0.0.1 -u "$MYSQL_USER" -e "SELECT 1"'
          initialDelaySeconds: 5
          periodSeconds: 10
          timeoutSeconds: 5
      volumes:
      - name: db-storage
        persistentVolumeClaim:
          claimName: nextcloud-storage
---
apiVersion: v1
kind: Service
metadata:
  namespace: nextcloud
  name: nextcloud-db
  labels:
    app: nextcloud
spec:
  clusterIP: None
  selector:
    pod-label: nextcloud-db-pod
  ports:
  - protocol: TCP
    port: 3306
