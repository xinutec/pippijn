# dev-lint: allow-no-netpol — pre-existing: namespace needs a default-deny NetworkPolicy + allow-graph (network-hardening)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: coach-db
  namespace: coach
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: coach-db
  template:
    metadata:
      labels:
        app: coach-db
    spec:
      # The official image runs as uid 999 (mysql) when started unprivileged.
      # fsGroup 999 is a no-op for the existing PVC: the data dir was created
      # by the image's entrypoint as uid 999 already.
      securityContext:
        runAsNonRoot: true
        runAsUser: 999
        runAsGroup: 999
        fsGroup: 999
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: mariadb
          # 12.3 is the current LTS (GA 2026-05-28, supported to Jun 2029). MariaDB has
          # no downgrade path, so dump before bumping this:
          #   scripts/mariadb-major-upgrade.sh before coach coach   (then after)
          image: mariadb:12.3
          # No readOnlyRootFilesystem: mariadb writes /run/mysqld and its data dir.
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          ports:
            - containerPort: 3306
          env:
            # Migrate the system tables on first start after a major bump.
            - name: MARIADB_AUTO_UPGRADE
              value: "1"
            - name: MARIADB_DATABASE
              value: coach
            - name: MARIADB_USER
              valueFrom:
                secretKeyRef:
                  name: coach-secret
                  key: DB_USER
            - name: MARIADB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: coach-secret
                  key: DB_PASSWORD
            - name: MARIADB_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: coach-secret
                  key: DB_ROOT_PASSWORD
          volumeMounts:
            - name: data
              mountPath: /var/lib/mysql
              subPath: mariadb-data
          livenessProbe:
            exec:
              command: ["sh", "-c", "mariadb-admin ping -h 127.0.0.1 -u root -p\"$MARIADB_ROOT_PASSWORD\""]
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            exec:
              command: ["sh", "-c", "mariadb -h 127.0.0.1 -u root -p\"$MARIADB_ROOT_PASSWORD\" -e 'SELECT 1'"]
            initialDelaySeconds: 10
            periodSeconds: 5
          resources:
            requests:
              cpu: 50m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 1Gi
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: coach-db-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: coach-db
  namespace: coach
spec:
  clusterIP: None
  selector:
    app: coach-db
  ports:
    - port: 3306
