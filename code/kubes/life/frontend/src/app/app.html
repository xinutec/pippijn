@if (loading()) {
  <mat-progress-bar mode="indeterminate" />
} @else if (me(); as user) {
  <header class="topbar">
    <span class="brand">Life</span>
    <span class="spacer"></span>
    <button class="acct-btn" type="button" [matMenuTriggerFor]="acct" aria-label="Account">
      @if (user.avatarUrl && !avatarError()) {
        <img class="avatar" [src]="user.avatarUrl" alt="" (error)="avatarError.set(true)" />
      } @else {
        <mat-icon>account_circle</mat-icon>
      }
    </button>
    <mat-menu #acct="matMenu">
      <div class="acct-name">{{ user.displayName }}</div>
      <button mat-menu-item (click)="signOut()">
        <mat-icon>logout</mat-icon>
        <span>Sign out</span>
      </button>
    </mat-menu>
  </header>

  <main class="content">
    <router-outlet />
  </main>

  <nav class="nav">
    @for (n of nav; track n.path) {
      <a [routerLink]="n.path" routerLinkActive="active">
        <mat-icon>{{ n.icon }}</mat-icon>
        <span class="label">{{ n.label }}</span>
      </a>
    }
  </nav>
} @else {
  <div class="signin">
    <h1>Life</h1>
    <p>Your home, organised.</p>
    <a mat-flat-button color="primary" href="/login">Sign in with Nextcloud</a>
  </div>
}
