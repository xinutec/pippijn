@if (loading()) {
  <mat-progress-bar mode="indeterminate" />
} @else if (me(); as user) {
  <mat-toolbar color="primary" class="bar">
    <span class="brand">life</span>
    <span class="spacer"></span>
    <span class="user">{{ user.displayName }}</span>
    <button mat-button (click)="signOut()">Sign out</button>
  </mat-toolbar>

  <mat-sidenav-container class="shell">
    <mat-sidenav mode="side" opened class="nav">
      <mat-nav-list>
        <a mat-list-item routerLink="/search" routerLinkActive="active">
          <mat-icon matListItemIcon>search</mat-icon>
          <span matListItemTitle>Find</span>
        </a>
        <a mat-list-item routerLink="/inventory" routerLinkActive="active">
          <mat-icon matListItemIcon>kitchen</mat-icon>
          <span matListItemTitle>Inventory</span>
        </a>
        <a mat-list-item routerLink="/recipes" routerLinkActive="active">
          <mat-icon matListItemIcon>menu_book</mat-icon>
          <span matListItemTitle>Recipes</span>
        </a>
        <a mat-list-item routerLink="/house" routerLinkActive="active">
          <mat-icon matListItemIcon>home</mat-icon>
          <span matListItemTitle>House</span>
        </a>
      </mat-nav-list>
    </mat-sidenav>

    <mat-sidenav-content>
      <main class="content">
        <router-outlet />
      </main>
    </mat-sidenav-content>
  </mat-sidenav-container>
} @else {
  <div class="signin">
    <h1>life</h1>
    <p>Your home, organised.</p>
    <a mat-flat-button color="primary" href="/login">Sign in with Nextcloud</a>
  </div>
}
