<h2>Buy</h2>

@if (syncError(); as err) {
  <p class="sync-warn">{{ err }}</p>
}

@if (showAdd()) {
<div class="add">
  <mat-form-field appearance="outline" class="grow">
    <mat-label>Need to buy…</mat-label>
    <input matInput [ngModel]="name()" (ngModelChange)="name.set($event)" (keyup.enter)="add()" placeholder="e.g. Yoghurt" />
  </mat-form-field>
  <mat-form-field appearance="outline" class="narrow">
    <mat-label>Qty</mat-label>
    <input matInput type="number" inputmode="decimal" [ngModel]="quantity()" (ngModelChange)="quantity.set($event)" (keyup.enter)="add()" />
  </mat-form-field>
  <mat-form-field appearance="outline" class="narrow">
    <mat-label>Unit</mat-label>
    <input matInput [ngModel]="unit()" (ngModelChange)="unit.set($event)" (keyup.enter)="add()" />
  </mat-form-field>
  <mat-form-field appearance="outline" class="grow">
    <mat-label>Barcode</mat-label>
    <input matInput [ngModel]="barcode()" (ngModelChange)="barcode.set($event)" inputmode="numeric" (keyup.enter)="lookup()" />
    <button matSuffix mat-icon-button (click)="scan()" aria-label="Scan barcode">
      <mat-icon>photo_camera</mat-icon>
    </button>
    <button matSuffix mat-icon-button (click)="lookup()" [disabled]="lookingUp()" aria-label="Look up product">
      <mat-icon>{{ lookingUp() ? 'hourglass_top' : 'search' }}</mat-icon>
    </button>
  </mat-form-field>
  <button mat-flat-button (click)="add()">Add</button>
</div>
}

<app-list-state
  [loading]="!loaded()"
  [empty]="items().length === 0"
  emptyIcon="shopping_cart"
  emptyText="Nothing on the list. Tap + to add what you need to buy."
/>

<mat-list>
  @for (it of items(); track it.ulid) {
    <mat-list-item>
      <mat-checkbox
        matListItemIcon
        [checked]="it.done"
        (change)="toggle(it)"
        [attr.aria-label]="'Bought ' + it.name"
      ></mat-checkbox>
      <span matListItemTitle class="row-title">
        @if (it.barcode) {
          <app-product-thumb class="inline-thumb" [barcode]="it.barcode" />
        }
        <span [class.done]="it.done">{{ it.name }}</span>
      </span>
      @if (label(it)) {
        <span matListItemLine [class.done]="it.done">{{ label(it) }}</span>
      }
      <button matListItemMeta mat-icon-button (click)="remove(it)" aria-label="Remove">
        <mat-icon>delete</mat-icon>
      </button>
    </mat-list-item>
  }
</mat-list>

@if (doneCount() > 0) {
  <div class="bought-actions">
    <button mat-flat-button (click)="buyDone()">
      <mat-icon>add_shopping_cart</mat-icon>
      Got {{ doneCount() }} → add to inventory
    </button>
    <button mat-button (click)="clearDone()">Clear bought</button>
  </div>
}

<!-- Hidden while the "bought → inventory" bar owns the bottom, unless the add
     form is already open (so you can still close it). -->
@if (doneCount() === 0 || showAdd()) {
<div class="fab-anchor">
  <button mat-fab class="add-fab" (click)="toggleAdd()" [attr.aria-label]="showAdd() ? 'Close the add form' : 'Add to the list'">
    <mat-icon>{{ showAdd() ? 'close' : 'add' }}</mat-icon>
  </button>
</div>
}
