<h2>Settings</h2>

<mat-card>
  <mat-card-header>
    <mat-card-title>About</mat-card-title>
    <mat-card-subtitle>Life — your home, organised.</mat-card-subtitle>
  </mat-card-header>
  <mat-card-content>
    <mat-list>
      <mat-list-item lines="2">
        <span matListItemTitle>Version</span>
        <span matListItemLine class="mono">{{ build.sha }}</span>
      </mat-list-item>
      @if (builtAt) {
        <mat-list-item lines="2">
          <span matListItemTitle>Built</span>
          <span matListItemLine>{{ builtAt }}</span>
        </mat-list-item>
      }
    </mat-list>
    <p class="hint">
      This is the build running in this tab. If it looks out of date, check for updates.
    </p>
  </mat-card-content>
  <mat-card-actions align="end">
    <button mat-stroked-button [disabled]="checking()" (click)="checkForUpdates()">
      <mat-icon>refresh</mat-icon>
      Check for updates
    </button>
  </mat-card-actions>
</mat-card>
