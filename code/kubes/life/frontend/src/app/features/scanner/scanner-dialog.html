<div class="scanner">
  @if (error(); as e) {
    <div class="err">
      <mat-icon>videocam_off</mat-icon>
      <p>{{ e }}</p>
    </div>
  } @else {
    <video #video playsinline muted></video>
    <div class="reticle"></div>
    <p class="hint">Point the camera at a barcode</p>
    @if (torchAvailable()) {
      <button
        mat-icon-button
        class="torch"
        (click)="toggleTorch()"
        [attr.aria-label]="torchOn() ? 'Turn the light off' : 'Turn the light on'"
      >
        <mat-icon>{{ torchOn() ? 'flashlight_off' : 'flashlight_on' }}</mat-icon>
      </button>
    }
  }

  @if (typing()) {
    <div class="manual">
      <mat-form-field appearance="outline" subscriptSizing="dynamic">
        <mat-label>Barcode</mat-label>
        <input
          matInput
          #manualInput
          inputmode="numeric"
          [ngModel]="manualCode()"
          (ngModelChange)="manualCode.set($event)"
          (keyup.enter)="submitManual()"
        />
      </mat-form-field>
      <button mat-flat-button (click)="submitManual()" [disabled]="!manualCode().trim()">
        Use
      </button>
    </div>
  }

  <div class="actions">
    <button mat-button (click)="toggleTyping()" class="type-instead">
      {{ typing() ? 'Back to camera' : 'Type it instead' }}
    </button>
    <button mat-flat-button (click)="cancel()" class="cancel">Cancel</button>
  </div>
</div>
