apiVersion: apps/v1
kind: Deployment
metadata:
  name: signal-cli-rest-api
  namespace: signal
spec:
  replicas: 1
  strategy:
    type: Recreate # single RWO data PVC + single linked device
  selector:
    matchLabels:
      app: signal-cli-rest-api
  template:
    metadata:
      labels:
        app: signal-cli-rest-api
    spec:
      # dev-lint: allow-unhardened — this third-party image's entrypoint runs
      # usermod/groupmod as root before dropping to uid/gid 1000, so the pod
      # cannot be forced non-root (runAsNonRoot makes those root-only calls fail
      # with "cannot lock /etc/group" and the container crash-loops). fsGroup keeps
      # the PVC writable by the dropped-to user; that's as far as we can harden it.
      securityContext:
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: rest-api
          # Pinned: 0.100 (2026-06-11) bundles signal-cli >=0.14.x, which fixes
          # the secondary-device-link 409 (missing-capabilities) that presage hit.
          image: bbernhard/signal-cli-rest-api:0.100
          env:
            # json-rpc: long-lived daemon, the only mode that exposes
            # /v1/receive/<number> as a streaming websocket.
            - name: MODE
              value: json-rpc
          ports:
            - containerPort: 8080
          # tcpSocket (not httpGet): the json-rpc daemon listens on 8080 when it's
          # up — this makes a rollout wait for it instead of flipping Ready instantly
          # (the missing probe that hid a crash-loop during the 2026-07 hardening).
          readinessProbe:
            tcpSocket:
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          volumeMounts:
            - name: data
              mountPath: /home/.local/share/signal-cli
          resources:
            requests:
              cpu: 100m
              memory: 384Mi
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: signal-cli-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: signal-cli-rest-api
  namespace: signal
spec:
  selector:
    app: signal-cli-rest-api
  ports:
    - port: 8080
      targetPort: 8080
