apiVersion: apps/v1
kind: Deployment
metadata:
  name: signal-archiver
  namespace: signal
spec:
  replicas: 1
  strategy:
    type: Recreate # single RWO store PVC + a single linked device
  selector:
    matchLabels:
      app: signal-archiver
  template:
    metadata:
      labels:
        app: signal-archiver
    spec:
      containers:
        - name: archiver
          image: xinutec/signal-archiver:latest
          # `run`: link-if-needed, then stream. First-run linking prints the
          # provisioning URL to logs — see README for the QR step.
          args: ["run"]
          env:
            - name: DB_HOST
              value: signal-db
            - name: DB_NAME
              value: signal
            - name: SIGNAL_STORE_URL
              value: sqlite:///data/signal.db
            - name: DB_USER
              valueFrom:
                secretKeyRef: { name: signal-secret, key: DB_USER }
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef: { name: signal-secret, key: DB_PASSWORD }
            - name: STORE_PASSPHRASE
              valueFrom:
                secretKeyRef: { name: signal-secret, key: STORE_PASSPHRASE }
          volumeMounts:
            - name: store
              mountPath: /data
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
      volumes:
        - name: store
          persistentVolumeClaim:
            claimName: signal-store-pvc
