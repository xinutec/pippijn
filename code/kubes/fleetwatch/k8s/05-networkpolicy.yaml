# Only the fleetwatch app may reach the DB — so a compromised pod elsewhere in the
# cluster gets no path to MariaDB. This policy is safe under k3s/kube-router
# (it doesn't touch kubelet probe traffic) and IS applied by sync.sh.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: fleetwatch-db-from-app-only
  namespace: fleetwatch
spec:
  podSelector:
    matchLabels:
      app: fleetwatch-db
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: fleetwatch-app
      ports:
        - port: 3306
