<header class="topbar">
  <span class="brand">
    <mat-icon aria-hidden="true">dns</mat-icon>
    Fleetwatch
  </span>
  <span class="build tnum" title="running build">{{ build.sha }}</span>
</header>

<main class="content">
  <router-outlet />
</main>

<nav class="nav" aria-label="Sections">
  @for (t of tabs(); track t.path) {
    <a
      class="tab"
      [routerLink]="t.path"
      routerLinkActive="active"
      [routerLinkActiveOptions]="{ exact: t.exact }"
    >
      <span class="tab-icon">
        <mat-icon aria-hidden="true">{{ t.icon }}</mat-icon>
        @if (t.label === 'Problems' && problemCount() > 0) {
          <span class="badge tnum">{{ problemCount() }}</span>
        }
      </span>
      <span class="tab-label">{{ t.label }}</span>
    </a>
  }
</nav>
