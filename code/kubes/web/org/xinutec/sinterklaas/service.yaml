---
apiVersion: apps/v1
kind: Deployment
metadata:
  namespace: web
  name: httpd-sinterklaas
spec:
  selector:
    matchLabels:
      run: httpd-sinterklaas
  replicas: 2
  template:
    metadata:
      labels:
        run: httpd-sinterklaas
    spec:
      # nginx-unprivileged runs as uid 101 and listens on :8080 — no root, no
      # privileged-port bind, so the whole pod drops to non-root.
      securityContext:
        runAsNonRoot: true
        runAsUser: 101
        runAsGroup: 101
        seccompProfile:
          type: RuntimeDefault
      containers:
      - name: httpd-sinterklaas
        image: nginxinc/nginx-unprivileged:alpine
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop: ["ALL"]
        ports:
        - containerPort: 8080
        volumeMounts:
        - name: html-volume
          mountPath: /usr/share/nginx/html
        readinessProbe:
          httpGet:
            path: /
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 10
      volumes:
      - name: html-volume
        configMap:
          name: sinterklaas-html
---
apiVersion: v1
kind: Service
metadata:
  namespace: web
  name: httpd-sinterklaas
  labels:
    run: httpd-sinterklaas
spec:
  ports:
  - port: 80
    targetPort: 8080
    protocol: TCP
  selector:
    run: httpd-sinterklaas
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  namespace: web
  name: sinterklaas-ingress
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
spec:
  ingressClassName: nginx
  tls:
  - hosts:
    - sinterklaas.xinutec.org
    secretName: sinterklaas-tls
  rules:
  - host: sinterklaas.xinutec.org
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: httpd-sinterklaas
            port:
              number:  80
