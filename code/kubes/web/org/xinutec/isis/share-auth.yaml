# HTTP basic auth for the dicom-scan share on isis.xinutec.org.
# Scoped to /share/share-cc58ab5c727c4a25 only (brain-tumour imaging +
# medical documents); the rest of the host stays open via isis-ingress.
# Uses the standard ingress-nginx basic-auth annotations (auth-type,
# auth-secret) with the credentials in the Secret below.
---
apiVersion: v1
kind: Secret
metadata:
  namespace: web
  name: basic-auth
type: Opaque
stringData:
  # htpasswd line, bcrypt. Username: pippijn.
  auth: 'pippijn:$2y$05$dXdskHmbm8Xxe/WqnYJnfuY.n8.a7i82RhZqKHb8oOJexEdpXDQ1y'
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  namespace: web
  name: isis-share-auth
  annotations:
    nginx.ingress.kubernetes.io/auth-type: basic
    nginx.ingress.kubernetes.io/auth-secret: web/basic-auth
    nginx.ingress.kubernetes.io/auth-realm: "Authentication required"
spec:
  ingressClassName: nginx
  rules:
  - host: isis.xinutec.org
    http:
      paths:
      - path: /share/share-cc58ab5c727c4a25
        pathType: Prefix
        backend:
          service:
            name: httpd-isis
            port:
              number: 80
