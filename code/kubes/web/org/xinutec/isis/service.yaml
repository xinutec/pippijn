---
apiVersion: v1
kind: ConfigMap
metadata:
  namespace: web
  name: httpd-isis-nginx-config
data:
  default.conf: |
    server {
        listen 8080;
        server_name _;
        root /usr/share/nginx/html;
        index index.html;

        location ~ \.(md|py|sh)$ {
            default_type text/plain;
        }
    }
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  namespace: web
  name: httpd-isis-storage
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  namespace: web
  name: httpd-isis
spec:
  selector:
    matchLabels:
      run: httpd-isis
  replicas: 2
  template:
    metadata:
      labels:
        run: httpd-isis
    spec:
      # nginx-unprivileged runs as uid 101 on :8080 — no root, no privileged
      # bind. fsGroup lets that uid traverse the file-share PVC; OnRootMismatch
      # skips the recursive chown when the volume is already group-owned.
      securityContext:
        runAsNonRoot: true
        runAsUser: 101
        runAsGroup: 101
        fsGroup: 101
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile:
          type: RuntimeDefault
      containers:
      - name: httpd-isis
        image: nginxinc/nginx-unprivileged:alpine
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop: ["ALL"]
        ports:
        - containerPort: 8080
        volumeMounts:
        - name: webroot
          mountPath: /usr/share/nginx/html/share
        - name: nginx-config
          mountPath: /etc/nginx/conf.d/default.conf
          subPath: default.conf
          readOnly: true
        readinessProbe:
          httpGet:
            path: /
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 10
      volumes:
      - name: webroot
        persistentVolumeClaim:
          claimName: httpd-isis-storage
      - name: nginx-config
        configMap:
          name: httpd-isis-nginx-config
---
apiVersion: v1
kind: Service
metadata:
  namespace: web
  name: httpd-isis
  labels:
    run: httpd-isis
spec:
  ports:
  - port: 80
    targetPort: 8080
    protocol: TCP
  selector:
    run: httpd-isis
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  namespace: web
  name: isis-ingress
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  ingressClassName: nginx
  tls:
  - hosts:
    - isis.xinutec.org
    secretName: isis-tls
  rules:
  - host: isis.xinutec.org
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: httpd-isis
            port:
              number: 80
