# slides.xinutec.org — password-gated static host for Marp talk decks.
#
# Routes to the dedicated `slides` nginx (see service.yaml), NOT the shared
# httpd-isis server. Decks live at the backend webroot root, so there is no path
# rewrite: the public path /<deck>/... passes through unchanged, and nginx's
# trailing-slash redirect stays in public terms (no :8080 / /share leak).
#
# TLS via letsencrypt-prod (HTTP-01). Basic auth uses the slides-owned
# web/slides-auth secret (username: pippijn) — independent of the dicom-scan
# share's web/basic-auth. Apply as root on isis (yaml, not ad-hoc kubectl edits).
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  namespace: web
  name: slides-ingress
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/auth-type: basic
    nginx.ingress.kubernetes.io/auth-secret: web/slides-auth
    nginx.ingress.kubernetes.io/auth-realm: "Authentication required"
spec:
  ingressClassName: nginx
  tls:
  - hosts:
    - slides.xinutec.org
    secretName: slides-tls
  rules:
  - host: slides.xinutec.org
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: slides
            port:
              number: 80
