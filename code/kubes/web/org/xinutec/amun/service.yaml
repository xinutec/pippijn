---
# dev-lint: allow-no-netpol — pre-existing: namespace needs a default-deny NetworkPolicy + allow-graph (network-hardening)
apiVersion: apps/v1
kind: Deployment
metadata:
  namespace: web
  name: httpd-amun
spec:
  selector:
    matchLabels:
      run: httpd-amun
  replicas: 2
  template:
    metadata:
      labels:
        run: httpd-amun
    spec:
      # nginx-unprivileged runs as uid 101 and listens on :8080, so no root and
      # no privileged-port bind — the whole pod can drop to non-root.
      securityContext:
        runAsNonRoot: true
        runAsUser: 101
        runAsGroup: 101
        seccompProfile:
          type: RuntimeDefault
      volumes:
      - name: assetlinks-config-volume
        configMap:
          name: assetlinks-config
      containers:
      # dev-lint: allow-no-mem-limit / dev-lint: allow-rootfs-rw — pre-existing writable rootfs (fix per-app: add emptyDir for writable paths); pre-existing (fix: size from kubectl top)
      - name: httpd-amun
        image: nginxinc/nginx-unprivileged:alpine
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop: ["ALL"]
        ports:
        - containerPort: 8080
        volumeMounts:
        - name: assetlinks-config-volume
          mountPath: /usr/share/nginx/html/.well-known/assetlinks.json
          subPath: assetlinks.json
        readinessProbe:
          httpGet:
            path: /
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  namespace: web
  name: httpd-amun
  labels:
    run: httpd-amun
spec:
  ports:
  - port: 80
    targetPort: 8080
    protocol: TCP
  selector:
    run: httpd-amun
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  namespace: web
  name: amun-ingress
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
spec:
  ingressClassName: nginx
  tls:
  - hosts:
    - amun.xinutec.org
    secretName: amun-tls
  rules:
  - host: amun.xinutec.org
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: httpd-amun
            port:
              number:  80
