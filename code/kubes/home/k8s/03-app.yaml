apiVersion: apps/v1
kind: Deployment
metadata:
  name: home
  namespace: home
spec:
  replicas: 1
  selector:
    matchLabels:
      app: home
  template:
    metadata:
      labels:
        app: home
    spec:
      # Matches the nonroot "node" user in the image (uid 1000).
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        # dev-lint: allow-rootfs-rw — pre-existing writable rootfs (fix per-app: add emptyDir for writable paths)
        - name: home
          image: xinutec/home:latest
          command: ["node", "dist/server.js"]
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          ports:
            - containerPort: 3000
          env:
            - name: PORT
              value: "3000"
            - name: DB_HOST
              value: home-db
            - name: DB_NAME
              value: home
            - name: DB_USER
              valueFrom:
                secretKeyRef: { name: home-secret, key: DB_USER }
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef: { name: home-secret, key: DB_PASSWORD }
            - name: INGEST_TOKEN
              valueFrom:
                secretKeyRef: { name: home-secret, key: INGEST_TOKEN }
          readinessProbe:
            httpGet: { path: /health, port: 3000 }
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet: { path: /health, port: 3000 }
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests:
              cpu: 10m
              memory: 128Mi
            limits:
              cpu: 200m
              memory: 256Mi
---
apiVersion: v1
kind: Service
metadata:
  name: home
  namespace: home
spec:
  selector:
    app: home
  ports:
    - port: 80
      targetPort: 3000
