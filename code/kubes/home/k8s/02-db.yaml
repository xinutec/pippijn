apiVersion: apps/v1
kind: Deployment
metadata:
  name: home-db
  namespace: home
spec:
  replicas: 1
  strategy:
    type: Recreate # single RWO PVC — never run two DB pods at once
  selector:
    matchLabels:
      app: home-db
  template:
    metadata:
      labels:
        app: home-db
    spec:
      containers:
        - name: mariadb
          image: mariadb:11.8
          env:
            - name: MARIADB_DATABASE
              value: home
            - name: MARIADB_USER
              valueFrom:
                secretKeyRef: { name: home-secret, key: DB_USER }
            - name: MARIADB_PASSWORD
              valueFrom:
                secretKeyRef: { name: home-secret, key: DB_PASSWORD }
            - name: MARIADB_ROOT_PASSWORD
              valueFrom:
                secretKeyRef: { name: home-secret, key: DB_ROOT_PASSWORD }
          ports:
            - containerPort: 3306
          volumeMounts:
            - name: data
              mountPath: /var/lib/mysql
              subPath: mariadb-data
          livenessProbe:
            exec:
              command: ["healthcheck.sh", "--connect", "--innodb_initialized"]
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            exec:
              command: ["healthcheck.sh", "--connect"]
            initialDelaySeconds: 10
            periodSeconds: 5
          resources:
            requests:
              cpu: 50m
              memory: 256Mi
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: home-db-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: home-db
  namespace: home
spec:
  clusterIP: None # headless; the app reaches it by the name "home-db"
  selector:
    app: home-db
  ports:
    - port: 3306
      targetPort: 3306
