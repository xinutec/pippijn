# dev-lint: allow-no-netpol — pre-existing: namespace needs a default-deny NetworkPolicy + allow-graph (network-hardening)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: home-db
  namespace: home
spec:
  replicas: 1
  strategy:
    type: Recreate # single RWO PVC — never run two DB pods at once
  selector:
    matchLabels:
      app: home-db
  template:
    metadata:
      labels:
        app: home-db
    spec:
      # The official image runs as uid 999 (mysql) when started unprivileged;
      # fsGroup 999 keeps the data dir writable.
      securityContext:
        runAsNonRoot: true
        runAsUser: 999
        runAsGroup: 999
        fsGroup: 999
        seccompProfile:
          type: RuntimeDefault
      containers:
        # dev-lint: allow-no-mem-limit — pre-existing (fix: size from kubectl top)
        - name: mariadb
          # 12.3 is the current LTS (GA 2026-05-28, supported to Jun 2029). MariaDB has
          # no downgrade path, so dump before bumping this:
          #   scripts/mariadb-major-upgrade.sh before home home   (then after)
          image: mariadb:12.3
          # No readOnlyRootFilesystem: mariadb writes /run/mysqld and its data dir.
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          env:
            # Migrate the system tables on first start after a major bump.
            - name: MARIADB_AUTO_UPGRADE
              value: "1"
            - name: MARIADB_DATABASE
              value: home
            - name: MARIADB_USER
              valueFrom:
                secretKeyRef: { name: home-secret, key: DB_USER }
            - name: MARIADB_PASSWORD
              valueFrom:
                secretKeyRef: { name: home-secret, key: DB_PASSWORD }
            - name: MARIADB_ROOT_PASSWORD
              valueFrom:
                secretKeyRef: { name: home-secret, key: DB_ROOT_PASSWORD }
          ports:
            - containerPort: 3306
          volumeMounts:
            - name: data
              mountPath: /var/lib/mysql
              subPath: mariadb-data
          livenessProbe:
            exec:
              command: ["healthcheck.sh", "--connect", "--innodb_initialized"]
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            exec:
              command: ["healthcheck.sh", "--connect"]
            initialDelaySeconds: 10
            periodSeconds: 5
          resources:
            requests:
              cpu: 50m
              memory: 256Mi
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: home-db-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: home-db
  namespace: home
spec:
  clusterIP: None # headless; the app reaches it by the name "home-db"
  selector:
    app: home-db
  ports:
    - port: 3306
      targetPort: 3306
