# recall's fleet tier: api + web + the sync ingest, one container. NO ML runs here (the
# Mac keeps capture/ASR/diarize/LLM) — this is a light FastAPI + SQLite + static frontend.
# The sync routes only exist when RECALL_SYNC_TOKEN is set (from the recall-secret), and
# they are meant to be reached over WireGuard only (see 03-service.yaml + README), never
# the shared public nginx ingress.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: recall
  namespace: recall
spec:
  replicas: 1
  strategy:
    type: Recreate  # single RWO PVC — never two pods writing the archive at once
  selector:
    matchLabels:
      app: recall
  template:
    metadata:
      labels:
        app: recall
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000  # so uid 1000 can write the archive PVC
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: recall
          image: xinutec/recall:latest
          imagePullPolicy: Always
          # --out sets the data root; `recall api` overwrites RECALL_OUT from it, so the
          # env below can't be relied on — the flag is what binds the archive to /data.
          command:
            ["python", "-m", "recall", "api", "--out", "/data",
             "--host", "0.0.0.0", "--port", "8000"]
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          ports:
            # THE network gate. `hostIP` is the whole point: a bare hostPort would DNAT
            # on every address Isis has, including its public one — and a k8s hostPort
            # rule bypasses the NixOS firewall entirely (it lands in the nat table ahead
            # of it), so "the firewall will catch it" is false here. Pinned to Isis's
            # WireGuard address, the DNAT rule can only match a packet that arrived on
            # wg0. The public IP never answers on 8000; there is nothing to firewall.
            #
            # Not an nginx Ingress, deliberately: the shared ingress answers on Isis's
            # public IP whatever DNS says — obscurity, not a gate (confirmed 2026-07-09).
            # The hostPort IS the gate here, not a hole in one. The rule's advice ("use a
            # Service") is the wrong move for recall: a Service still needs an Ingress to
            # be reachable from the Mac, and the shared ingress answers on Isis's PUBLIC
            # IP whatever DNS says. Bound to the WireGuard address, this port cannot be
            # reached from the internet at all.
            - containerPort: 8000
              hostPort: 8000 # dev-lint: allow-host-port — bound to wg0 only, see hostIP
              hostIP: 10.100.0.2
          readinessProbe:
            tcpSocket:
              port: 8000
            initialDelaySeconds: 3
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 30
          env:
            # This node is the system of record, not a capture node: /api/capture records
            # pause/resume as *intent* the Mac mirrors onto the real mic (it runs no
            # capture agent here). RECALL_SYNC_TOKEN can't signal this — the Mac sets it
            # too — so the role is explicit.
            - name: RECALL_ROLE
              value: fleet
            - name: RECALL_SYNC_TOKEN
              valueFrom:
                secretKeyRef:
                  name: recall-secret
                  key: SYNC_TOKEN
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 1Gi
          volumeMounts:
            - name: data
              mountPath: /data
            - name: tmp
              mountPath: /tmp
            - name: logs
              mountPath: /app/logs
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: recall-data-pvc
        # readOnlyRootFilesystem is on, so every path the app writes needs a mount:
        # /tmp (ffmpeg scratch) and /app/logs (log rotation + client-error log).
        - name: tmp
          emptyDir: {}
        - name: logs
          emptyDir: {}
