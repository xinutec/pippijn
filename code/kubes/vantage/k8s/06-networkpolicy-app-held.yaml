# HELD — NOT applied by sync.sh. Kept here as the intended hardening.
#
# The app should be reachable only through the nginx ingress controller, so no
# other pod can hit the API directly and bypass the ingress' TLS + source-range
# gate. But k3s enforces NetworkPolicy via kube-router, which does NOT exempt
# node-sourced kubelet health-probe traffic — this policy as written would drop
# the liveness/readiness probes, mark the pod NotReady, and take the site down.
#
# Before applying: add an ingress rule that also admits the probe source (an
# ipBlock for the node/pod CIDR), then verify probes stay green on a live pod.
# Same caveat as life/k8s/05-networkpolicy.yaml.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: vantage-app-from-ingress-only
  namespace: vantage
spec:
  podSelector:
    matchLabels:
      app: vantage-app
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress-nginx
      ports:
        - port: 8080
