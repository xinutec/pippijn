<div class="cards">
  <mat-card class="stat-card">
    <mat-card-content>
      <div class="label">Steps</div>
      <div class="value">{{ steps() }}</div>
    </mat-card-content>
  </mat-card>
  <mat-card class="stat-card">
    <mat-card-content>
      <div class="label">Resting HR</div>
      <div class="value">{{ restingHr() }} <span class="unit">bpm</span></div>
    </mat-card-content>
  </mat-card>
  <mat-card class="stat-card">
    <mat-card-content>
      <div class="label">Active Minutes</div>
      <div class="value">{{ activeMinutes() }}</div>
    </mat-card-content>
  </mat-card>
  <mat-card class="stat-card">
    <mat-card-content>
      <div class="label">Calories</div>
      <div class="value">{{ calories() }}</div>
    </mat-card-content>
  </mat-card>
  <mat-card class="stat-card">
    <mat-card-content>
      <div class="label">Sleep</div>
      <div class="value">{{ sleep() }}</div>
    </mat-card-content>
  </mat-card>
  <mat-card class="stat-card">
    <mat-card-content>
      <div class="label">Sleep Efficiency</div>
      <div class="value">{{ sleepEfficiency() }}<span class="unit">%</span></div>
    </mat-card-content>
  </mat-card>
</div>
