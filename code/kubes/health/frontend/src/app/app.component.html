<mat-toolbar color="primary" class="toolbar">
	<span class="title">Health@if (mode() === "share") { (shared) }</span>
	<span class="spacer"></span>
	@if (health.user(); as user) {
		<span class="user-name">{{ user.displayName }}</span>
		@if (mode() !== "share") {
			<a mat-icon-button routerLink="/settings" aria-label="Settings" class="settings-link">
				<mat-icon>settings</mat-icon>
			</a>
			<form method="POST" action="/logout" class="logout-form">
				<button mat-button type="submit">Logout</button>
			</form>
		}
	}
</mat-toolbar>

@if (mode() !== "share") {
	<app-reauth-banner></app-reauth-banner>
}

<main class="content">
	<router-outlet></router-outlet>
</main>
