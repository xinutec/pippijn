apiVersion: batch/v1
kind: CronJob
metadata:
  name: health-sync
  namespace: health
spec:
  # Every 15 min so Fitbit data (esp. sleep, which Fitbit only finalizes
  # after you wake) appears within ~15 min instead of up to an hour.
  # Each run re-queries a 2-day overlap (see SYNC_OVERLAP_DAYS); ~15
  # calls/run × 4 runs/hr stays well under Fitbit's 150 req/hr/user.
  schedule: "*/15 * * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      activeDeadlineSeconds: 3300
      template:
        spec:
          restartPolicy: OnFailure
          containers:
            - name: sync
              image: xinutec/health-sync:latest
              command: ["node", "dist/sync.js"]
              env:
                - name: DB_HOST
                  value: health-db
                - name: DB_NAME
                  value: health
                - name: DB_USER
                  valueFrom:
                    secretKeyRef:
                      name: health-secret
                      key: DB_USER
                - name: DB_PASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: health-secret
                      key: DB_PASSWORD
                - name: FITBIT_CLIENT_ID
                  valueFrom:
                    secretKeyRef:
                      name: health-secret
                      key: FITBIT_CLIENT_ID
                - name: FITBIT_CLIENT_SECRET
                  valueFrom:
                    secretKeyRef:
                      name: health-secret
                      key: FITBIT_CLIENT_SECRET
                - name: NC_CLIENT_ID
                  valueFrom:
                    secretKeyRef:
                      name: health-secret
                      key: NC_CLIENT_ID
                - name: NC_CLIENT_SECRET
                  valueFrom:
                    secretKeyRef:
                      name: health-secret
                      key: NC_CLIENT_SECRET
              resources:
                requests:
                  cpu: 50m
                  memory: 128Mi
                limits:
                  cpu: 500m
                  memory: 512Mi
