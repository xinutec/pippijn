apiVersion: batch/v1
kind: CronJob
metadata:
  name: health-sync
  namespace: health
spec:
  # Every 15 min so Fitbit data (esp. sleep, which Fitbit only finalizes
  # after you wake) appears within ~15 min instead of up to an hour.
  # Each run re-queries a 2-day overlap (see SYNC_OVERLAP_DAYS); ~15
  # calls/run × 4 runs/hr stays well under Fitbit's 150 req/hr/user.
  schedule: "*/15 * * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      activeDeadlineSeconds: 3300
      template:
        spec:
          # Matches the nonroot "node" user in the image (uid 1000).
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: 1000
            seccompProfile:
              type: RuntimeDefault
          restartPolicy: OnFailure
          containers:
            # dev-lint: allow-rootfs-rw — pre-existing writable rootfs (fix per-app: add emptyDir for writable paths)
            - name: sync
              image: xinutec/health-sync:latest
              securityContext:
                allowPrivilegeEscalation: false
                capabilities:
                  drop: ["ALL"]
              command: ["node", "dist/sync.js"]
              env:
                - name: DB_HOST
                  value: health-db
                - name: DB_NAME
                  value: health
                - name: DB_USER
                  valueFrom:
                    secretKeyRef:
                      name: health-secret
                      key: DB_USER
                - name: DB_PASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: health-secret
                      key: DB_PASSWORD
                - name: FITBIT_CLIENT_ID
                  valueFrom:
                    secretKeyRef:
                      name: health-secret
                      key: FITBIT_CLIENT_ID
                - name: FITBIT_CLIENT_SECRET
                  valueFrom:
                    secretKeyRef:
                      name: health-secret
                      key: FITBIT_CLIENT_SECRET
                # Google Health weight sync (#260). The refresh token is
                # long-lived (OAuth app published 2026-07-18); creds managed
                # out-of-band in the health-google secret. GH_USER_ID names
                # the health-sync user the Google account belongs to.
                - name: GH_USER_ID
                  value: pippijn
                - name: GH_CLIENT_ID
                  valueFrom:
                    secretKeyRef:
                      name: health-google
                      key: GH_CLIENT_ID
                - name: GH_CLIENT_SECRET
                  valueFrom:
                    secretKeyRef:
                      name: health-google
                      key: GH_CLIENT_SECRET
                - name: GH_REFRESH_TOKEN
                  valueFrom:
                    secretKeyRef:
                      name: health-google
                      key: GH_REFRESH_TOKEN
              resources:
                requests:
                  cpu: 50m
                  memory: 128Mi
                limits:
                  cpu: 500m
                  memory: 512Mi
