apiVersion: apps/v1
kind: Deployment
metadata:
  name: health-auth
  namespace: health
spec:
  replicas: 1
  selector:
    matchLabels:
      app: health-auth
  template:
    metadata:
      labels:
        app: health-auth
    spec:
      # Matches the nonroot "node" user in the image (uid 1000).
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: auth
          image: xinutec/health-sync:latest
          command: ["node", "dist/server.js"]
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          ports:
            - containerPort: 3000
          readinessProbe:
            tcpSocket:
              port: 3000
            initialDelaySeconds: 3
            periodSeconds: 10
          env:
            - name: AUTH_PORT
              value: "3000"
            - name: DB_HOST
              value: health-db
            - name: DB_NAME
              value: health
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: health-secret
                  key: DB_USER
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: health-secret
                  key: DB_PASSWORD
            - name: FITBIT_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: health-secret
                  key: FITBIT_CLIENT_ID
            - name: FITBIT_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: health-secret
                  key: FITBIT_CLIENT_SECRET
            - name: NC_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: health-secret
                  key: NC_CLIENT_ID
            - name: NC_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: health-secret
                  key: NC_CLIENT_SECRET
            - name: SESSION_SECRET
              valueFrom:
                secretKeyRef:
                  name: health-secret
                  key: SESSION_SECRET
            # Comma-separated PhoneTrack session tokens allowed through
            # the Owntracks proxy. Requests with any other token are
            # rejected before reaching Nextcloud — protects both NC's
            # brute-force counter and the proxy's in-process state.
            - name: OWNTRACKS_ALLOWED_TOKENS
              valueFrom:
                secretKeyRef:
                  name: health-secret
                  key: OWNTRACKS_ALLOWED_TOKENS
            # Factor scorer pipeline gate. DISABLED in prod (2026-05-23
            # late) after discovering golden harness was silently testing
            # the legacy cascade while production ran the factor scorer
            # — see feedback_parity_tools_must_mirror_env.md. The factor
            # scorer produced material regressions vs cascade on every
            # blessed day (train trips disappearing, train-vs-driving
            # misclassification, etc.) but those went unnoticed because
            # prod-db.sh didn't propagate the flag. Re-enable when the
            # factor scorer is properly calibrated under the now-correct
            # parity harness AND its golden output matches ground truth
            # at least as well as the cascade. Set to "1" to enable.
            # - name: USE_FACTOR_SCORER
            #   value: "1"
            # - name: USE_BIOMETRIC_FACTOR
            #   value: "1"
            # Presence-continuity emission factor — same flag the
            # decode cron uses. velocity.ts in the auth pod does not
            # read this directly, but it must be present on the auth
            # pod env so scripts/prod-db.sh can mirror it via printenv
            # for the golden harness. See feedback_parity_tools_must_mirror_env.
            - name: USE_CONTINUITY_CONTINUATION
              value: "1"
            # Building-escape walk corrector (case-based: route a drawn walk
            # around building blocks it falsely crosses; leave genuine visits —
            # doorsteps, hospitals, concourses — alone). Display-geometry only;
            # measured on the 2026-07-01 fixture before enabling. ON by default
            # in code since 2026-07-02 (an opt-in flag made local replays
            # diverge from prod); "0" is the emergency off-switch, so the
            # explicit "1" here is documentation, not activation.
            - name: WALK_BUILDING_ESCAPE
              value: "1"
          resources:
            requests:
              # Idle most of the time; a /api/velocity compute is a short CPU
              # burst. Keep the reservation modest but non-trivial.
              cpu: 250m
              memory: 128Mi
            limits:
              # The velocity pipeline is CPU-bound (map-matchers / HMM decode):
              # ~6 CPU-seconds for a busy day. A 200m cap CFS-throttled that to
              # ~50 s wall-clock (measured: walkMatch 4 s of CPU → 40 s on-pod).
              # 2 cores lets a compute finish in a few seconds; isis sits ~7%.
              cpu: "2"
              # Headroom for the local-OSM-mirror cold-start: multiple
              # large Overpass responses (5-50 MB each) can be in flight
              # while filling osm_points / osm_lines for a new bbox.
              # Steady-state usage stays well under this.
              memory: 512Mi
---
apiVersion: v1
kind: Service
metadata:
  name: health-auth
  namespace: health
spec:
  selector:
    app: health-auth
  ports:
    - port: 80
      targetPort: 3000
