apiVersion: apps/v1
kind: Deployment
metadata:
  name: health-auth
  namespace: health
spec:
  replicas: 1
  selector:
    matchLabels:
      app: health-auth
  template:
    metadata:
      labels:
        app: health-auth
    spec:
      containers:
        - name: auth
          image: xinutec/health-sync:latest
          command: ["node", "dist/server.js"]
          ports:
            - containerPort: 3000
          env:
            - name: AUTH_PORT
              value: "3000"
            - name: DB_HOST
              value: health-db
            - name: DB_NAME
              value: health
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: health-secret
                  key: DB_USER
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: health-secret
                  key: DB_PASSWORD
            - name: FITBIT_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: health-secret
                  key: FITBIT_CLIENT_ID
            - name: FITBIT_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: health-secret
                  key: FITBIT_CLIENT_SECRET
            - name: NC_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: health-secret
                  key: NC_CLIENT_ID
            - name: NC_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: health-secret
                  key: NC_CLIENT_SECRET
            - name: SESSION_SECRET
              valueFrom:
                secretKeyRef:
                  name: health-secret
                  key: SESSION_SECRET
            # Comma-separated PhoneTrack session tokens allowed through
            # the Owntracks proxy. Requests with any other token are
            # rejected before reaching Nextcloud — protects both NC's
            # brute-force counter and the proxy's in-process state.
            - name: OWNTRACKS_ALLOWED_TOKENS
              valueFrom:
                secretKeyRef:
                  name: health-secret
                  key: OWNTRACKS_ALLOWED_TOKENS
            # Phase 1 cutover of the classification pipeline. When set,
            # refineMode dispatches to the factor-scorer path (candidate
            # generator + speed-emission/osm-distance/mode-coherence
            # factor stack) instead of the legacy rule cascade. The
            # cascade remains intact behind the flag flip — unset this
            # env var to revert without a code change.
            - name: USE_FACTOR_SCORER
              value: "1"
          resources:
            requests:
              cpu: 10m
              memory: 128Mi
            limits:
              cpu: 200m
              # Headroom for the local-OSM-mirror cold-start: multiple
              # large Overpass responses (5-50 MB each) can be in flight
              # while filling osm_points / osm_lines for a new bbox.
              # Steady-state usage stays well under this.
              memory: 512Mi
---
apiVersion: v1
kind: Service
metadata:
  name: health-auth
  namespace: health
spec:
  selector:
    app: health-auth
  ports:
    - port: 80
      targetPort: 3000
