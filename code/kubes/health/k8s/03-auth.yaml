apiVersion: apps/v1
kind: Deployment
metadata:
  name: health-auth
  namespace: health
spec:
  replicas: 1
  selector:
    matchLabels:
      app: health-auth
  template:
    metadata:
      labels:
        app: health-auth
    spec:
      containers:
        - name: auth
          image: xinutec/health-sync:latest
          command: ["node", "dist/server.js"]
          ports:
            - containerPort: 3000
          env:
            - name: AUTH_PORT
              value: "3000"
            - name: DB_HOST
              value: health-db
            - name: DB_NAME
              value: health
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: health-secret
                  key: DB_USER
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: health-secret
                  key: DB_PASSWORD
            - name: FITBIT_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: health-secret
                  key: FITBIT_CLIENT_ID
            - name: FITBIT_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: health-secret
                  key: FITBIT_CLIENT_SECRET
            - name: NC_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: health-secret
                  key: NC_CLIENT_ID
            - name: NC_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: health-secret
                  key: NC_CLIENT_SECRET
            - name: SESSION_SECRET
              valueFrom:
                secretKeyRef:
                  name: health-secret
                  key: SESSION_SECRET
            # Comma-separated PhoneTrack session tokens allowed through
            # the Owntracks proxy. Requests with any other token are
            # rejected before reaching Nextcloud — protects both NC's
            # brute-force counter and the proxy's in-process state.
            - name: OWNTRACKS_ALLOWED_TOKENS
              valueFrom:
                secretKeyRef:
                  name: health-secret
                  key: OWNTRACKS_ALLOWED_TOKENS
            # Factor scorer pipeline gate. DISABLED in prod (2026-05-23
            # late) after discovering golden harness was silently testing
            # the legacy cascade while production ran the factor scorer
            # — see feedback_parity_tools_must_mirror_env.md. The factor
            # scorer produced material regressions vs cascade on every
            # blessed day (train trips disappearing, train-vs-driving
            # misclassification, etc.) but those went unnoticed because
            # prod-db.sh didn't propagate the flag. Re-enable when the
            # factor scorer is properly calibrated under the now-correct
            # parity harness AND its golden output matches ground truth
            # at least as well as the cascade. Set to "1" to enable.
            # - name: USE_FACTOR_SCORER
            #   value: "1"
            # - name: USE_BIOMETRIC_FACTOR
            #   value: "1"
            # Presence-continuity emission factor — same flag the
            # decode cron uses. velocity.ts in the auth pod does not
            # read this directly, but it must be present on the auth
            # pod env so scripts/prod-db.sh can mirror it via printenv
            # for the golden harness. See feedback_parity_tools_must_mirror_env.
            - name: USE_CONTINUITY_CONTINUATION
              value: "1"
          resources:
            requests:
              cpu: 10m
              memory: 128Mi
            limits:
              cpu: 200m
              # Headroom for the local-OSM-mirror cold-start: multiple
              # large Overpass responses (5-50 MB each) can be in flight
              # while filling osm_points / osm_lines for a new bbox.
              # Steady-state usage stays well under this.
              memory: 512Mi
---
apiVersion: v1
kind: Service
metadata:
  name: health-auth
  namespace: health
spec:
  selector:
    app: health-auth
  ports:
    - port: 80
      targetPort: 3000
