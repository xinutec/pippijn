apiVersion: apps/v1
kind: Deployment
metadata:
  name: health-auth
  namespace: health
spec:
  replicas: 1
  selector:
    matchLabels:
      app: health-auth
  template:
    metadata:
      labels:
        app: health-auth
    spec:
      # Matches the nonroot "node" user in the image (uid 1000).
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        # dev-lint: allow-rootfs-rw — pre-existing writable rootfs (fix per-app: add emptyDir for writable paths)
        - name: auth
          image: xinutec/health-sync:latest
          command: ["node", "dist/server.js"]
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          ports:
            - containerPort: 3000
          readinessProbe:
            tcpSocket:
              port: 3000
            initialDelaySeconds: 3
            periodSeconds: 10
          env:
            - name: AUTH_PORT
              value: "3000"
            - name: DB_HOST
              value: health-db
            - name: DB_NAME
              value: health
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: health-secret
                  key: DB_USER
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: health-secret
                  key: DB_PASSWORD
            - name: FITBIT_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: health-secret
                  key: FITBIT_CLIENT_ID
            - name: FITBIT_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: health-secret
                  key: FITBIT_CLIENT_SECRET
            - name: NC_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: health-secret
                  key: NC_CLIENT_ID
            - name: NC_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: health-secret
                  key: NC_CLIENT_SECRET
            - name: SESSION_SECRET
              valueFrom:
                secretKeyRef:
                  name: health-secret
                  key: SESSION_SECRET
            # Comma-separated PhoneTrack session tokens allowed through
            # the Owntracks proxy. Requests with any other token are
            # rejected before reaching Nextcloud — protects both NC's
            # brute-force counter and the proxy's in-process state.
            - name: OWNTRACKS_ALLOWED_TOKENS
              valueFrom:
                secretKeyRef:
                  name: health-secret
                  key: OWNTRACKS_ALLOWED_TOKENS
            # Shared secret gating the /internal service API — the coach app
            # reads the user's places to auto-select a training location.
            # Provisioned into health-secret out-of-band; optional so the pod
            # still starts if absent (then /internal rejects every request).
            - name: SERVICE_TOKEN
              valueFrom:
                secretKeyRef:
                  name: health-secret
                  key: SERVICE_TOKEN
                  optional: true
            # Factor scorer pipeline gate. DISABLED in prod (2026-05-23
            # late) after discovering golden harness was silently testing
            # the legacy cascade while production ran the factor scorer
            # — see feedback_parity_tools_must_mirror_env.md. The factor
            # scorer produced material regressions vs cascade on every
            # blessed day (train trips disappearing, train-vs-driving
            # misclassification, etc.) but those went unnoticed because
            # prod-db.sh didn't propagate the flag. Re-enable when the
            # factor scorer is properly calibrated under the now-correct
            # parity harness AND its golden output matches ground truth
            # at least as well as the cascade. Set to "1" to enable.
            # - name: USE_FACTOR_SCORER
            #   value: "1"
            # - name: USE_BIOMETRIC_FACTOR
            #   value: "1"
            # Presence-continuity emission factor — same flag the
            # decode cron uses. velocity.ts in the auth pod does not
            # read this directly, but it must be present on the auth
            # pod env so scripts/prod-db.sh can mirror it via printenv
            # for the golden harness. See feedback_parity_tools_must_mirror_env.
            - name: USE_CONTINUITY_CONTINUATION
              value: "1"
            # C4 continuity flags (task #224) — same flags the decode
            # cron uses, and for the same reason as the line above: the
            # auth pod does not read them, but scripts/prod-db.sh
            # mirrors the pod env via printenv so a Mac replay decodes
            # the same day the cron wrote. These gate the HSMM decode
            # itself, so a missing mirror is the exact
            # feedback_parity_tools_must_mirror_env failure. Rationale
            # and the open defect (#366) are documented at the cron —
            # kubes/health/k8s/08-decode-recent.yaml.
            - name: USE_CADENCE_IMPUTATION
              value: "1"
            - name: USE_SEGMENT_EVIDENCE
              value: "1"
            - name: USE_CHAIN_CONTEXT
              value: "1"
            - name: USE_REACQUIRE_ROBUST_SPEED
              value: "1"
            # Building-escape walk corrector (case-based: route a drawn walk
            # around building blocks it falsely crosses; leave genuine visits —
            # doorsteps, hospitals, concourses — alone). Display-geometry only;
            # measured on the 2026-07-01 fixture before enabling. ON by default
            # in code since 2026-07-02 (an opt-in flag made local replays
            # diverge from prod); "0" is the emergency off-switch, so the
            # explicit "1" here is documentation, not activation.
            - name: WALK_BUILDING_ESCAPE
              value: "1"
            # Serve the verified Lean geometry passes on the request path
            # (docs/proposals/2026-07-verified-core-lean.md). `on` routes five
            # proved display passes — simplify, removeSpurs, trim, despike,
            # rejectSpikes — through the in-process bridge to verified_cli
            # (LEAN_CLI is set by the Dockerfile), serving the theorem-backed
            # output. Golden is 31/31 byte-identical to the pure-TS pipeline
            # under `on` (the only divergences are 2 accepted Douglas-Peucker
            # near-ties that wash out downstream), and any bridge failure falls
            # back to TS (swallow-over-wrong). "off"/unset reverts instantly.
            - name: LEAN_PASSES
              value: "on"
            # Verified Lean walk-matcher (qMatchWalkSegment). OFF: correctness is
            # proved + gated (compare-match 173/173) and the output is
            # display-only, but the serve path is too SLOW to run in-band. It adds
            # a synchronous bridge call PER LEG, and the matcher's compute
            # (Viterbi over the corridor graph) dwarfs the geometry passes — a
            # 2026-07-21 flip made the decode-recent job exceed its 1800s deadline
            # (normally ~6min), with the bridge cycling timeout→rebuild. `shadow`
            # is no cheaper (it still runs the Lean matcher). Needs a perf fix
            # (batch per-day / precompute off the request path) BEFORE any flip.
            - name: LEAN_MATCH
              value: "off"
          resources:
            requests:
              # Idle most of the time; a /api/velocity compute is a short CPU
              # burst. Keep the reservation modest but non-trivial.
              cpu: 250m
              memory: 128Mi
            limits:
              # The velocity pipeline is CPU-bound (map-matchers / HMM decode):
              # ~6 CPU-seconds for a busy day. A 200m cap CFS-throttled that to
              # ~50 s wall-clock (measured: walkMatch 4 s of CPU → 40 s on-pod).
              # 2 cores lets a compute finish in a few seconds; isis sits ~7%.
              cpu: "2"
              # Headroom for the local-OSM-mirror cold-start: multiple
              # large Overpass responses (5-50 MB each) can be in flight
              # while filling osm_points / osm_lines for a new bbox.
              # Steady-state usage stays well under this.
              memory: 512Mi
---
apiVersion: v1
kind: Service
metadata:
  name: health-auth
  namespace: health
spec:
  selector:
    app: health-auth
  ports:
    - port: 80
      targetPort: 3000
