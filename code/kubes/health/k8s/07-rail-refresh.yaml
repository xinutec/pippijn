apiVersion: batch/v1
kind: CronJob
metadata:
  name: health-rail-refresh
  namespace: health
spec:
  # Daily at 05:00 UTC — quiet time. Runs after the weekly focus
  # refresh (04:00 Sun) so a fresh home_tz is available, but does not
  # depend on it. Daily cadence keeps a newly-travelled route's snapped
  # geometry no more than a day stale.
  schedule: "0 5 * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      activeDeadlineSeconds: 5400
      template:
        spec:
          # Matches the nonroot "node" user in the image (uid 1000).
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: 1000
            seccompProfile:
              type: RuntimeDefault
          restartPolicy: OnFailure
          containers:
            # dev-lint: allow-rootfs-rw — pre-existing writable rootfs (fix per-app: add emptyDir for writable paths)
            - name: refresh
              image: xinutec/health-sync:latest
              securityContext:
                allowPrivilegeEscalation: false
                capabilities:
                  drop: ["ALL"]
              command: ["node", "dist/cli/refresh-rail-routes.js"]
              env:
                # Verified Lean rail shortest path (Verified.Rail.dijkstraC).
                # SHADOW: the proved search runs on every route this job
                # resolves and is compared against TS, but the TS path is what
                # gets cached. This job is where the search runs in BULK — the
                # decode's railSnap pass is only an indexed lookup into the
                # cache this fills — so this is where the soak evidence comes
                # from. Grep pod logs for `lean-rail`.
                #
                # Batch path, no user waiting: raise the warm bridge-call
                # ceiling like 08-decode-recent does, because a rail graph is
                # large (the fixture measures V=22310 / E=110764) and the
                # adjacency crosses the bridge as JSON.
                - name: LEAN_RAIL
                  value: "shadow"
                - name: LEAN_CALL_TIMEOUT_MS
                  value: "30000"
                - name: DB_HOST
                  value: health-db
                - name: DB_NAME
                  value: health
                - name: DB_USER
                  valueFrom:
                    secretKeyRef:
                      name: health-secret
                      key: DB_USER
                - name: DB_PASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: health-secret
                      key: DB_PASSWORD
                - name: NC_CLIENT_ID
                  valueFrom:
                    secretKeyRef:
                      name: health-secret
                      key: NC_CLIENT_ID
                - name: NC_CLIENT_SECRET
                  valueFrom:
                    secretKeyRef:
                      name: health-secret
                      key: NC_CLIENT_SECRET
              resources:
                requests:
                  cpu: 100m
                  memory: 256Mi
                limits:
                  cpu: 1000m
                  memory: 1Gi
