apiVersion: batch/v1
kind: CronJob
metadata:
  name: health-decode-recent
  namespace: health
spec:
  # Daily at 06:00 UTC — after focus-refresh (Sunday 04:00) and
  # rail-refresh (daily 05:00) so the HSMM decode sees fresh
  # focus_places + rail geometry inputs.
  schedule: "0 6 * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      # Headroom for the per-minute rail/road proximity (#238): one
      # nearbyWays lookup per distinct ~11 m minute-median location, and
      # the first run after a code/area change pays cold-cache Overpass
      # fetches at the 300 m radius. Steady state is well under this;
      # the margin absorbs that cold first run.
      #
      # 1800 (was 900) since the Lean shadow: when the image carries the
      # verified decoder (LEAN_CLI, set by the Dockerfile), decode-day
      # A/Bs each decoded day against it — ~30 s/day on top of the decode
      # (quantise + export + both decodes), ~3.5 min for the 7-day window.
      # Purely observational; grep pod logs for `lean-shadow`.
      activeDeadlineSeconds: 1800
      template:
        spec:
          # Matches the nonroot "node" user in the image (uid 1000).
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: 1000
            seccompProfile:
              type: RuntimeDefault
          restartPolicy: OnFailure
          containers:
            # dev-lint: allow-rootfs-rw — pre-existing writable rootfs (fix per-app: add emptyDir for writable paths)
            - name: decode
              image: xinutec/health-sync:latest
              securityContext:
                allowPrivilegeEscalation: false
                capabilities:
                  drop: ["ALL"]
              # Decode the recent window, then rebuild presence_log from the
              # fresh decoded_days. presence_log feeds the empty-day inference
              # and the USE_CONTINUITY_CONTINUATION emission factor (below);
              # without this second step it goes stale and both silently
              # degrade. DB-only and idempotent (DELETE+INSERT over the window).
              command:
                - sh
                - -c
                - >-
                  node dist/cli/decode-day.js --user pippijn --tz Europe/London --days 7 &&
                  node dist/cli/refresh-presence-log.js 90
              env:
                - name: DB_HOST
                  value: health-db
                - name: DB_NAME
                  value: health
                - name: DB_USER
                  valueFrom:
                    secretKeyRef:
                      name: health-secret
                      key: DB_USER
                - name: DB_PASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: health-secret
                      key: DB_PASSWORD
                - name: NC_CLIENT_ID
                  valueFrom:
                    secretKeyRef:
                      name: health-secret
                      key: NC_CLIENT_ID
                - name: NC_CLIENT_SECRET
                  valueFrom:
                    secretKeyRef:
                      name: health-secret
                      key: NC_CLIENT_SECRET
                # Presence-continuity emission factor — Phase 3 of
                # docs/proposals/2026-06-presence-continuity.md. Without
                # this, the HSMM defaults to the user's highest-history
                # focus_place (Home with 90+ unique days) on minutes
                # without GPS evidence, which on sparse-GPS hospital
                # days produces phantom "@ Home" segments where the
                # user was actually inpatient. Verified 2026-06-05 on
                # 2026-06-01 (8-night Cleveland Clinic stay rendered
                # as "@ Home" all day). Goldens pass 9/10 with the
                # flag on (no regression vs off — the remaining 1 is
                # the 05-22 time-shift bug, separate).
                - name: USE_CONTINUITY_CONTINUATION
                  value: "1"
                # C4 cross-segment continuity (task #224,
                # docs/proposals/2026-07-continuity-c4.md). Enabled
                # 2026-07-17 after the decoder scoreboard
                # (npm run score-decoder, 10 audited days vs ground
                # truth) improved on five days with one adjudicated
                # loss: legs-mode 65->70, legs-line 8->10, phantom
                # rides 5->4, and 06-12 + 06-16 each gaining journeys.
                #
                # USE_CADENCE_IMPUTATION: steps_intraday only writes
                # non-zero minutes, so a truly-still minute arrives as
                # null and the zero-inflated cadence emission SKIPS —
                # walking pays no step penalty exactly where steps
                # would refute it. Impute 0 only when the watch is
                # demonstrably alive around the minute.
                # USE_SEGMENT_EVIDENCE: segment-level displacement
                # physics, softened by bracket slop.
                # USE_CHAIN_CONTEXT: exit->entry place reachability +
                # line boarding feasibility at the transition.
                # USE_REACQUIRE_ROBUST_SPEED: widen the stationary
                # speed emission right after a GPS reacquisition,
                # scaled by rail proximity — post-occlusion Kalman
                # speed is dominated by position-jump artefacts.
                #
                # KNOWN OPEN DEFECT (task #366): the per-minute mode
                # prior scales with duration, so a slow vehicle leg can
                # still read as a stay (2026-05-25 12:40-12:49 is the
                # recorded case). Flipping these flags does not cause
                # it — it exposes it.
                - name: USE_CADENCE_IMPUTATION
                  value: "1"
                - name: USE_SEGMENT_EVIDENCE
                  value: "1"
                - name: USE_CHAIN_CONTEXT
                  value: "1"
                - name: USE_REACQUIRE_ROBUST_SPEED
                  value: "1"
                # Verified Lean HSMM decoder — SHADOW. Decodes each day both ways
                # and logs the per-day `lean-hsmm[shadow] <date> …` ledger (see
                # src/lean/lean-hsmm.ts): a run is EXACT only when the day clears
                # BOTH lean↔tsQuant (the verified decode equals the TS trellis on
                # the same integer tensors) AND float↔quant 100% (the quantised
                # decode equals the FLOAT decode still served — a day under 100%
                # is a near-tie flip). Production keeps serving the TS decode; the
                # `on` flip (serving the quantised decode) is held pending the
                # decision to ship it. This flag is now required: the shadow used
                # to run on LEAN_CLI presence alone, so without it the A/B stops.
                - name: LEAN_HSMM
                  value: "shadow"
                # Serve the verified Lean geometry passes when re-decoding days
                # (docs/proposals/2026-07-verified-core-lean.md) — kept identical
                # to the health-auth server so a cached (cron-persisted) day and a
                # fresh server compute draw the same geometry. `on` also logs the
                # per-day `lean-passes[on] <date> …` ledger (calls/failures/
                # divergences) so the flip stays continuously observable. The
                # line adjudicates each divergence against the accepted near-tie
                # manifest and splits the tally by run, so what to look for is
                # `EXACT` or `all accepted`; `UNEXPLAINED` means a divergence
                # nobody has signed off, and `IN SERVED OUTPUT` means it came
                # from the persisted decode rather than the observational
                # shadow run. TS fallback on any bridge failure.
                - name: LEAN_PASSES
                  value: "on"
                # Verified Lean walk-matcher — ON since 2026-07-21. An earlier
                # flip the same day blew this job's 1800s deadline on cost, not
                # correctness; the matcher's hot path has since moved off Lean
                # `Int` (a GMP bignum past 2^31) onto `Nat`, and now measures
                # ~0.36 s/leg over the gated golden legs (185/185 since the gate's
                # leg population was corrected). See 03-auth.yaml.
                - name: LEAN_MATCH
                  value: "on"
                # Raise the warm bridge-call ceiling (default 5s) for the batch
                # path: this job has no user waiting, and the heaviest real legs
                # take several seconds on the throttled pod, so the tight ceiling
                # dropped ~4/80 of the biggest legs to the TS fallback. 30s keeps
                # them on the verified path; the interactive /api/velocity server
                # keeps the 5s default so a slow leg never stalls a request.
                - name: LEAN_CALL_TIMEOUT_MS
                  value: "30000"
              resources:
                requests:
                  cpu: 100m
                  memory: 256Mi
                limits:
                  cpu: 1000m
                  # 1536Mi (was 768Mi): the Lean shadow holds the exported
                  # integer tensors (~60 MB JSON with the C4 flags on) in
                  # node while the spawned verified_cli peaks ~300 MB.
                  memory: 1536Mi
