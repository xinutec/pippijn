apiVersion: batch/v1
kind: CronJob
metadata:
  name: health-decode-recent
  namespace: health
spec:
  # Daily at 06:00 UTC — after focus-refresh (Sunday 04:00) and
  # rail-refresh (daily 05:00) so the HSMM decode sees fresh
  # focus_places + rail geometry inputs.
  schedule: "0 6 * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      # Headroom for the per-fix rail/road proximity (#238): each fix
      # does a nearbyWays lookup, and the first run after a code/area
      # change pays cold-cache Overpass fetches at the 300 m radius.
      # In-cluster DB latency keeps the steady state well under this;
      # the bump absorbs the cold first run. (Proximity efficiency is
      # tracked as a follow-up — per-minute instead of per-fix.)
      activeDeadlineSeconds: 1800
      template:
        spec:
          restartPolicy: OnFailure
          containers:
            - name: decode
              image: xinutec/health-sync:latest
              command: ["node", "dist/cli/decode-day.js", "--user", "pippijn", "--tz", "Europe/London", "--days", "7"]
              env:
                - name: DB_HOST
                  value: health-db
                - name: DB_NAME
                  value: health
                - name: DB_USER
                  valueFrom:
                    secretKeyRef:
                      name: health-secret
                      key: DB_USER
                - name: DB_PASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: health-secret
                      key: DB_PASSWORD
                - name: NC_CLIENT_ID
                  valueFrom:
                    secretKeyRef:
                      name: health-secret
                      key: NC_CLIENT_ID
                - name: NC_CLIENT_SECRET
                  valueFrom:
                    secretKeyRef:
                      name: health-secret
                      key: NC_CLIENT_SECRET
                # Presence-continuity emission factor — Phase 3 of
                # docs/proposals/2026-06-presence-continuity.md. Without
                # this, the HSMM defaults to the user's highest-history
                # focus_place (Home with 90+ unique days) on minutes
                # without GPS evidence, which on sparse-GPS hospital
                # days produces phantom "@ Home" segments where the
                # user was actually inpatient. Verified 2026-06-05 on
                # 2026-06-01 (8-night Cleveland Clinic stay rendered
                # as "@ Home" all day). Goldens pass 9/10 with the
                # flag on (no regression vs off — the remaining 1 is
                # the 05-22 time-shift bug, separate).
                - name: USE_CONTINUITY_CONTINUATION
                  value: "1"
              resources:
                requests:
                  cpu: 100m
                  memory: 256Mi
                limits:
                  cpu: 1000m
                  memory: 768Mi
