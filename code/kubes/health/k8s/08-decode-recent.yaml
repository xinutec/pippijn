apiVersion: batch/v1
kind: CronJob
metadata:
  name: health-decode-recent
  namespace: health
spec:
  # Daily at 06:00 UTC — after focus-refresh (Sunday 04:00) and
  # rail-refresh (daily 05:00) so the HSMM decode sees fresh
  # focus_places + rail geometry inputs.
  schedule: "0 6 * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      # Headroom for the per-minute rail/road proximity (#238): one
      # nearbyWays lookup per distinct ~11 m minute-median location, and
      # the first run after a code/area change pays cold-cache Overpass
      # fetches at the 300 m radius. Steady state is well under this;
      # the margin absorbs that cold first run.
      activeDeadlineSeconds: 900
      template:
        spec:
          # Matches the nonroot "node" user in the image (uid 1000).
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: 1000
            seccompProfile:
              type: RuntimeDefault
          restartPolicy: OnFailure
          containers:
            # dev-lint: allow-rootfs-rw — pre-existing writable rootfs (fix per-app: add emptyDir for writable paths)
            - name: decode
              image: xinutec/health-sync:latest
              securityContext:
                allowPrivilegeEscalation: false
                capabilities:
                  drop: ["ALL"]
              # Decode the recent window, then rebuild presence_log from the
              # fresh decoded_days. presence_log feeds the empty-day inference
              # and the USE_CONTINUITY_CONTINUATION emission factor (below);
              # without this second step it goes stale and both silently
              # degrade. DB-only and idempotent (DELETE+INSERT over the window).
              command:
                - sh
                - -c
                - >-
                  node dist/cli/decode-day.js --user pippijn --tz Europe/London --days 7 &&
                  node dist/cli/refresh-presence-log.js 90
              env:
                - name: DB_HOST
                  value: health-db
                - name: DB_NAME
                  value: health
                - name: DB_USER
                  valueFrom:
                    secretKeyRef:
                      name: health-secret
                      key: DB_USER
                - name: DB_PASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: health-secret
                      key: DB_PASSWORD
                - name: NC_CLIENT_ID
                  valueFrom:
                    secretKeyRef:
                      name: health-secret
                      key: NC_CLIENT_ID
                - name: NC_CLIENT_SECRET
                  valueFrom:
                    secretKeyRef:
                      name: health-secret
                      key: NC_CLIENT_SECRET
                # Presence-continuity emission factor — Phase 3 of
                # docs/proposals/2026-06-presence-continuity.md. Without
                # this, the HSMM defaults to the user's highest-history
                # focus_place (Home with 90+ unique days) on minutes
                # without GPS evidence, which on sparse-GPS hospital
                # days produces phantom "@ Home" segments where the
                # user was actually inpatient. Verified 2026-06-05 on
                # 2026-06-01 (8-night Cleveland Clinic stay rendered
                # as "@ Home" all day). Goldens pass 9/10 with the
                # flag on (no regression vs off — the remaining 1 is
                # the 05-22 time-shift bug, separate).
                - name: USE_CONTINUITY_CONTINUATION
                  value: "1"
              resources:
                requests:
                  cpu: 100m
                  memory: 256Mi
                limits:
                  cpu: 1000m
                  memory: 768Mi
