# dev-lint: allow-no-netpol — pre-existing: namespace needs a default-deny NetworkPolicy + allow-graph (network-hardening)
# The messages viewer runs IN the `signal` namespace so it can read the signal
# DB (service `signal-db`) and reuse `signal-secret` (DB_USER/DB_PASSWORD)
# in-namespace — k8s secretKeyRef cannot cross namespaces. It owns only its own
# `sessions` table in that DB (created on boot).
apiVersion: apps/v1
kind: Deployment
metadata:
  name: messages
  namespace: signal
spec:
  replicas: 1
  selector:
    matchLabels:
      app: messages
  template:
    metadata:
      labels:
        app: messages
    spec:
      # Matches the nonroot user baked into the image (Dockerfile, uid 65532).
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: messages
          image: xinutec/messages:latest
          # Stateless — serves the bundle and reads the read-only attachments
          # mount, never writes — so the whole root fs can be read-only.
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          ports:
            - containerPort: 8080
          env:
            # --- archive DB (shared signal DB, same namespace) ---
            - name: DB_HOST
              value: signal-db
            - name: DB_NAME
              value: signal
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: signal-secret
                  key: DB_USER
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: signal-secret
                  key: DB_PASSWORD
            # --- auth / app config ---
            - name: NC_BASE_URL
              value: https://dash.xinutec.org
            - name: NC_REDIRECT_URI
              value: https://messages.xinutec.org/auth/callback
            - name: ALLOWED_USERS
              value: pippijn
            - name: SESSION_SECRET
              valueFrom:
                secretKeyRef:
                  name: messages-secret
                  key: SESSION_SECRET
            - name: NC_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: messages-secret
                  key: NC_CLIENT_ID
            - name: NC_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: messages-secret
                  key: NC_CLIENT_SECRET
            - name: ATTACHMENTS_DIR
              value: /attachments
          volumeMounts:
            # The ingester's downloaded attachment blobs, read-only. RWO PVC is
            # fine alongside the ingester since both pods are on the isis node.
            - name: attachments
              mountPath: /attachments
              readOnly: true
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 2
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 20
          resources:
            requests:
              cpu: 25m
              memory: 64Mi
            limits:
              memory: 256Mi
      volumes:
        - name: attachments
          persistentVolumeClaim:
            claimName: signal-attachments-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: messages
  namespace: signal
spec:
  selector:
    app: messages
  ports:
    - port: 80
      targetPort: 8080
