---
# dev-lint: allow-no-netpol — pre-existing: namespace needs a default-deny NetworkPolicy + allow-graph (network-hardening)
apiVersion: apps/v1
kind: Deployment
metadata:
  namespace: nocodb
  name: nocodb-server
  labels:
    app: nocodb
spec:
  selector:
    matchLabels:
      pod-label: nocodb-server-pod
  replicas: 1
  template:
    metadata:
      labels:
        pod-label: nocodb-server-pod
    spec:
      volumes:
      # Create the shared files volume to be used in both pods
      - name: server-storage
        persistentVolumeClaim:
          claimName: nocodb-storage
      # dev-lint: allow-unhardened — the nocodb image ships no non-root user and
      # runs as root writing to a root-owned /usr/app/data (verified on the live
      # pod); forcing runAsNonRoot breaks its data directory.
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      containers:
      # dev-lint: allow-no-mem-limit — pre-existing (fix: size from kubectl top)
      - name: nocodb
        image: nocodb/nocodb:0.257.2
        imagePullPolicy: Always
        volumeMounts:
        - name: server-storage
          mountPath: /usr/app/data
          subPath: server-data
        readinessProbe:
          tcpSocket:
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  namespace: nocodb
  name: nocodb-server
  labels:
    app: nocodb
spec:
  selector:
    pod-label: nocodb-server-pod
  ports:
  - protocol: TCP
    port: 8080
