domain: xinutec.org
hostnames:
  - mail.xinutec.org
# Roundcube DB password: chart 2.7.x guards it on upgrade (bitnami-common) and demands
# the existing value. We point at the in-cluster `mailu-roundcube` secret.
# ⚠ FOOTGUN (hit 2026-07-22): `mailu-roundcube` was originally created BY the chart. The
# moment you set existingSecret, the chart stops templating it, so `helm upgrade` PRUNES
# it — deleting the password. It must therefore exist as a STANDALONE (non-helm-managed)
# secret. Recovery if lost:
#   helm get manifest mailu --revision <last-good> -n mailu-mailserver \
#     | awk 'BEGIN{RS="\n---\n"} /kind: Secret/&&/name: mailu-roundcube/{print}' \
#     | kubectl apply -f -
# (secretKey + initialAccount.password are still supplied inline via secrets.yaml.)
global:
  database:
    roundcube:
      existingSecret: mailu-roundcube
      existingSecretPasswordKey: roundcube-db-password
initialAccount:
  enabled: true
  username: "mailadmin"
  domain: "xinutec.org"
  #password: ""  # XXX: add here when updating
  mode: "update"
logLevel: INFO
persistence:
  size: 100Gi
  storageClass: local-path
ingress:
  ingressClassName: "nginx"
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
# Bitnami paywall workaround (Aug 2025). The mailu chart uses
# bitnami/redis as a subchart; point it at bitnamilegacy.
redis:
  image:
    repository: bitnamilegacy/redis
# ClamAV: chart 2.1.1 references tag 1.2.0-6 (doesn't exist on Docker
# Hub) and has probes that check /tmp/clamd.pid (official image doesn't
# create PID files). Fix: override tag to 1.5.2 + patch probes after
# helm upgrade (see sync.sh).
clamav:
  image:
    tag: "1.5.2"
#secretKey: ""  # XXX: add here when updating
