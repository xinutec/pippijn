---
# dev-lint: allow-no-netpol — pre-existing: namespace needs a default-deny NetworkPolicy + allow-graph (network-hardening)
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  namespace: ircd
  name: ircd-storage
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: local-path
  resources:
    requests:
      storage: 5Gi
---
apiVersion: apps/v1
# dev-lint: allow-no-netpol
kind: Deployment
metadata:
  namespace: ircd
  name: inspircd
spec:
  selector:
    matchLabels:
      run: inspircd
  # hostPort binds the node interface, so two pods can't coexist during a rollout —
  # recreate (brief blip) instead of a RollingUpdate that would deadlock on the port.
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        run: inspircd
    spec:
      # The image already runs as the unprivileged `irc` user (uid 39, see the
      # Dockerfile's `USER irc`); the IRC ports are all >1024 so no root is
      # needed. Declare it so a rollout can't silently regress to root.
      securityContext:
        runAsNonRoot: true
        runAsUser: 39
        runAsGroup: 39
        fsGroup: 39
        seccompProfile:
          type: RuntimeDefault
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: ircd-storage
      containers:
        # dev-lint: allow-no-mem-limit / dev-lint: allow-rootfs-rw — pre-existing writable rootfs (fix per-app: add emptyDir for writable paths); pre-existing (fix: size from kubectl top)
        - name: ircd
          image: xinutec/ircd:latest
          imagePullPolicy: Always
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          ports:
            # hostPort so inspircd sees the real client IP (spam/ban tracking,
            # WHOIS) rather than the load-balancer's — a Service would NAT it.
            - containerPort: 6697
              hostPort: 6697  # dev-lint: allow-host-port
            - containerPort: 7005
              hostPort: 7005  # dev-lint: allow-host-port
            - containerPort: 7776
              hostPort: 7776  # dev-lint: allow-host-port
          readinessProbe:
            tcpSocket:
              port: 6697
            initialDelaySeconds: 5
            periodSeconds: 10
          volumeMounts:
            - mountPath: /etc/inspircd/conf/secret
              name: data
              subPath: secret
            - mountPath: /etc/inspircd/data
              name: data
              subPath: data
