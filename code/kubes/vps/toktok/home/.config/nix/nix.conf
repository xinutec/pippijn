# User-level nix config for the `builder` user inside the toktok dev
# container. Enables flake evaluation so home.nix can pull in the
# sadjow/claude-code-nix flake at home-manager-switch time (which runs
# inside the docker build via setup-local.sh).
#
# Public toktok-stack: doesn't touch nix configuration. This file is
# part of pippijn's personal layer only (xinutec/toktok:latest), not
# the shared toxchat/toktok-stack:latest-dev image.
experimental-features = nix-command flakes
