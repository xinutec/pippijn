---
# dev-lint: allow-no-netpol — pre-existing: namespace needs a default-deny NetworkPolicy + allow-graph (network-hardening)
apiVersion: v1
kind: Namespace
metadata:
  name: vps-pippijn
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  namespace: vps-pippijn
  name: irssi-storage
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: local-path
  resources:
    requests:
      storage: 5Gi
---
apiVersion: apps/v1
# dev-lint: allow-no-netpol
kind: Deployment
metadata:
  namespace: vps-pippijn
  name: irssi
spec:
  selector:
    matchLabels:
      run: irssi
  # hostPort binds the node interface, so two pods can't coexist during a rollout —
  # recreate (brief blip) instead of a RollingUpdate that would deadlock on the port.
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        run: irssi
    spec:
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: irssi-storage
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      containers:
        # dev-lint: allow-rootfs-rw — pre-existing writable rootfs (fix per-app: add emptyDir for writable paths)
        - name: irssi
          image: xinutec/irssi:latest
          imagePullPolicy: Always
          # Run the entrypoint under bash explicitly: the baked image's /init.sh
          # still carries a #!/bin/sh shebang while using `set -o pipefail` (a bash
          # builtin), so dash crashloops it. Overriding here fixes it without a
          # rebuild; the source shebang is also corrected to #!/bin/bash.
          command: ["/bin/bash", "/init.sh"]
          # dev-lint: allow-unhardened — the entrypoint must run as root (starts
          # sshd, manages /etc/ssh host keys, chowns the mounted volumes) before
          # dropping to the unprivileged irssi user; see the Dockerfile.
          env:
          - name: IRSSI_USER
            value: pippijn
          ports:
            # SSH terminal server: users ssh directly to this per-user hostPort,
            # so it must bind the node interface and see the real client IP.
            - containerPort: 22
              hostPort: 2230  # dev-lint: allow-host-port
          readinessProbe:
            tcpSocket:
              port: 22
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              memory: "64Mi"
              cpu: "10m"
            limits:
              memory: "128Mi"
              cpu: "100m"
          volumeMounts:
            - mountPath: /home/irssi
              name: data
              subPath: home
            - mountPath: /etc/ssh_keys
              name: data
              subPath: ssh
