---
name: build

on:
  push:
    branches: [main]
    # Images build from node:24-alpine / rust:1-bookworm, never from the flake,
    # so a flake.lock-only change (the monthly flake-update commit) can't affect
    # any image — skip the rebuild. Mixed commits that also touch code still run.
    paths-ignore:
      - "**/flake.lock"

jobs:
  inspircd:
    uses: xinutec/pippijn/.github/workflows/docker.yml@main
    with:
      path: code/kubes/ircd/inspircd
      image: ircd
    secrets:
      username: ${{ secrets.DOCKERHUB_USERNAME }}
      password: ${{ secrets.DOCKERHUB_PASSWORD }}

  irssi:
    uses: xinutec/pippijn/.github/workflows/docker.yml@main
    with:
      path: code/kubes/vps/irssi
      image: irssi
    secrets:
      username: ${{ secrets.DOCKERHUB_USERNAME }}
      password: ${{ secrets.DOCKERHUB_PASSWORD }}

  # health-sync builds in its own repo (github.com/xinutec/health → xinutec/health-sync:latest); only k8s stays here.

  # home builds in its own repo (github.com/xinutec/home → xinutec/home:latest); only k8s stays here.

  # Signal message archive (Rust). Gate the image on `cargo test` — the pure
  # parsing logic in src/parse.rs is unit-tested in tests/parse.rs.
  signal-verify:
    runs-on: ubuntu-latest
    container: rust:1-bookworm
    defaults:
      run:
        working-directory: code/kubes/signal
    steps:
      - uses: actions/checkout@v6
      - run: cargo test --release

  signal:
    needs: signal-verify
    uses: xinutec/pippijn/.github/workflows/docker.yml@main
    with:
      path: code/kubes/signal
      image: signal-archiver
    secrets:
      username: ${{ secrets.DOCKERHUB_USERNAME }}
      password: ${{ secrets.DOCKERHUB_PASSWORD }}

  # life builds in its own repo (github.com/xinutec/life → xinutec/life:latest); only k8s stays here.

  # coach builds in its own repo (github.com/xinutec/coach → xinutec/coach:latest); only k8s stays here.

  # messages builds in its own repo (github.com/xinutec/messages → xinutec/messages:latest); only k8s stays here.

  # fleetwatch builds in its own repo (github.com/xinutec/fleetwatch → xinutec/fleetwatch:latest); only k8s stays here.
