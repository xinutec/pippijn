---
name: build

on:
  push:
    branches: [main]

jobs:
  inspircd:
    uses: xinutec/pippijn/.github/workflows/docker.yml@main
    with:
      path: code/kubes/ircd/inspircd
      image: ircd
    secrets:
      username: ${{ secrets.DOCKERHUB_USERNAME }}
      password: ${{ secrets.DOCKERHUB_PASSWORD }}

  irssi:
    uses: xinutec/pippijn/.github/workflows/docker.yml@main
    with:
      path: code/kubes/vps/irssi
      image: irssi
    secrets:
      username: ${{ secrets.DOCKERHUB_USERNAME }}
      password: ${{ secrets.DOCKERHUB_PASSWORD }}

  # Gate the health-sync image on the full analysis suite — typecheck,
  # schema-drift, Biome + angular-eslint, and the backend + frontend
  # unit tests. Same `npm run verify` deploy.sh runs locally, so a
  # direct push to main is held to the same bar as a scripted deploy.
  # (The golden harness is not here: it needs DB access and runs from a
  # tunnel / cron, not plain CI.)
  health-verify:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: code/kubes/health
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
      - run: npm ci
      - run: npm ci --prefix frontend
      - run: npm run verify

  health-sync:
    needs: health-verify
    uses: xinutec/pippijn/.github/workflows/docker.yml@main
    with:
      path: code/kubes/health
      image: health-sync
    secrets:
      username: ${{ secrets.DOCKERHUB_USERNAME }}
      password: ${{ secrets.DOCKERHUB_PASSWORD }}

  # Home environment dashboard (IQAir AirVisual Pro). Same gate as health:
  # the image only builds if typecheck + Biome/eslint + backend/frontend
  # tests pass. Node 24 (newer than health's 22).
  home-verify:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: code/kubes/home
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
      - run: npm ci
      - run: npm ci --prefix frontend
      - run: npm run verify

  home:
    needs: home-verify
    uses: xinutec/pippijn/.github/workflows/docker.yml@main
    with:
      path: code/kubes/home
      image: home
    secrets:
      username: ${{ secrets.DOCKERHUB_USERNAME }}
      password: ${{ secrets.DOCKERHUB_PASSWORD }}

  # Signal message archive (Rust). Gate the image on `cargo test` — the pure
  # parsing logic in src/parse.rs is unit-tested in tests/parse.rs.
  signal-verify:
    runs-on: ubuntu-latest
    container: rust:1-bookworm
    defaults:
      run:
        working-directory: code/kubes/signal
    steps:
      - uses: actions/checkout@v6
      - run: cargo test --release

  signal:
    needs: signal-verify
    uses: xinutec/pippijn/.github/workflows/docker.yml@main
    with:
      path: code/kubes/signal
      image: signal-archiver
    secrets:
      username: ${{ secrets.DOCKERHUB_USERNAME }}
      password: ${{ secrets.DOCKERHUB_PASSWORD }}

  # Personal "life" app (Rust backend + Angular frontend). Gate the image on
  # clippy + cargo test; the DB-backed tests skip without LIFE_TEST_DATABASE_URL,
  # so plain CI runs them offline.
  life-verify:
    runs-on: ubuntu-latest
    container: rust:1-bookworm
    defaults:
      run:
        working-directory: code/kubes/life
    steps:
      - uses: actions/checkout@v6
      - run: rustup component add clippy
      - run: cargo clippy --all-targets -- -D warnings
      - run: cargo test

  life:
    needs: life-verify
    uses: xinutec/pippijn/.github/workflows/docker.yml@main
    with:
      path: code/kubes/life
      image: life
    secrets:
      username: ${{ secrets.DOCKERHUB_USERNAME }}
      password: ${{ secrets.DOCKERHUB_PASSWORD }}

  # Message-archive viewer (Rust backend + Angular frontend) over the Signal +
  # Google Chat data in the signal DB. Gate on clippy + cargo test (no DB needed).
  messages-verify:
    runs-on: ubuntu-latest
    container: rust:1-bookworm
    defaults:
      run:
        working-directory: code/kubes/messages
    steps:
      - uses: actions/checkout@v6
      - run: rustup component add clippy
      - run: cargo clippy --all-targets -- -D warnings
      - run: cargo test

  # Frontend static analysis: angular-eslint (incl. forbidding inline templates)
  # + a production build, same convention as health/home.
  messages-fe-verify:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: code/kubes/messages/frontend
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
      - run: npm ci
      - run: npm run lint
      - run: npx ng build --configuration production

  messages:
    needs: [messages-verify, messages-fe-verify]
    uses: xinutec/pippijn/.github/workflows/docker.yml@main
    with:
      path: code/kubes/messages
      image: messages
    secrets:
      username: ${{ secrets.DOCKERHUB_USERNAME }}
      password: ${{ secrets.DOCKERHUB_PASSWORD }}
