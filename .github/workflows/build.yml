---
name: build

on:
  push:
    branches: [main]
    # Images build from node:24-alpine / rust:1-bookworm, never from the flake,
    # so a flake.lock-only change (the monthly flake-update commit) can't affect
    # any image — skip the rebuild. Mixed commits that also touch code still run.
    paths-ignore:
      - "**/flake.lock"

jobs:
  inspircd:
    uses: xinutec/pippijn/.github/workflows/docker.yml@main
    with:
      path: code/kubes/ircd/inspircd
      image: ircd
    secrets:
      username: ${{ secrets.DOCKERHUB_USERNAME }}
      password: ${{ secrets.DOCKERHUB_PASSWORD }}

  irssi:
    uses: xinutec/pippijn/.github/workflows/docker.yml@main
    with:
      path: code/kubes/vps/irssi
      image: irssi
    secrets:
      username: ${{ secrets.DOCKERHUB_USERNAME }}
      password: ${{ secrets.DOCKERHUB_PASSWORD }}

  # Gate the health-sync image on the full analysis suite — typecheck,
  # schema-drift, Biome + angular-eslint, and the backend + frontend
  # unit tests. Same `npm run verify` deploy.sh runs locally, so a
  # direct push to main is held to the same bar as a scripted deploy.
  # (The golden harness is not here: it needs DB access and runs from a
  # tunnel / cron, not plain CI.)
  health-verify:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: code/kubes/health
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
      - run: npm ci
      - run: npm ci --prefix frontend
      - run: npm run verify

  health-sync:
    needs: health-verify
    uses: xinutec/pippijn/.github/workflows/docker.yml@main
    with:
      path: code/kubes/health
      image: health-sync
    secrets:
      username: ${{ secrets.DOCKERHUB_USERNAME }}
      password: ${{ secrets.DOCKERHUB_PASSWORD }}

  # Home environment dashboard (IQAir AirVisual Pro). Same gate as health:
  # the image only builds if typecheck + Biome/eslint + backend/frontend
  # tests pass. Node 24 (newer than health's 22).
  home-verify:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: code/kubes/home
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
      - run: npm ci
      - run: npm ci --prefix frontend
      - run: npm run verify

  home:
    needs: home-verify
    uses: xinutec/pippijn/.github/workflows/docker.yml@main
    with:
      path: code/kubes/home
      image: home
    secrets:
      username: ${{ secrets.DOCKERHUB_USERNAME }}
      password: ${{ secrets.DOCKERHUB_PASSWORD }}

  # Signal message archive (Rust). Gate the image on `cargo test` — the pure
  # parsing logic in src/parse.rs is unit-tested in tests/parse.rs.
  signal-verify:
    runs-on: ubuntu-latest
    container: rust:1-bookworm
    defaults:
      run:
        working-directory: code/kubes/signal
    steps:
      - uses: actions/checkout@v6
      - run: cargo test --release

  signal:
    needs: signal-verify
    uses: xinutec/pippijn/.github/workflows/docker.yml@main
    with:
      path: code/kubes/signal
      image: signal-archiver
    secrets:
      username: ${{ secrets.DOCKERHUB_USERNAME }}
      password: ${{ secrets.DOCKERHUB_PASSWORD }}

  # Personal "life" app (Rust backend + Angular frontend). Gate the image on
  # clippy + cargo test.
  life-verify:
    runs-on: ubuntu-latest
    container: rust:1-bookworm
    # A throwaway MariaDB so the per-entity DB round-trip tests actually run in
    # CI (they migrate + exercise the real sync SQL; they skip when the env var
    # is unset, which is the local no-DB case).
    services:
      mariadb:
        image: mariadb:11.8
        env:
          MARIADB_ROOT_PASSWORD: root
          MARIADB_DATABASE: life_test
        options: >-
          --health-cmd="healthcheck.sh --connect --innodb_initialized"
          --health-interval=5s --health-timeout=5s --health-retries=10
    env:
      LIFE_TEST_DATABASE_URL: mysql://root:root@mariadb:3306/life_test
    defaults:
      run:
        working-directory: code/kubes/life
    steps:
      - uses: actions/checkout@v6
      - run: rustup component add clippy
      - run: cargo clippy --all-targets -- -D warnings
      - run: cargo test -- --test-threads=1

  life:
    needs: life-verify
    uses: xinutec/pippijn/.github/workflows/docker.yml@main
    with:
      path: code/kubes/life
      image: life
    secrets:
      username: ${{ secrets.DOCKERHUB_USERNAME }}
      password: ${{ secrets.DOCKERHUB_PASSWORD }}

  # coach — training tracker + adaptive pacing coach (Rust backend + Angular
  # frontend). The pacing engine tests are pure (no DB), so no MariaDB service.
  coach-verify:
    runs-on: ubuntu-latest
    container: rust:1-bookworm
    defaults:
      run:
        working-directory: code/kubes/coach
    steps:
      - uses: actions/checkout@v6
      - run: rustup component add clippy
      - run: cargo clippy --all-targets -- -D warnings
      - run: cargo test

  coach-fe-verify:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: code/kubes/coach/frontend
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
      - run: npm ci
      - run: npm run lint
      # ui-check builds (prod) then runs the shared layout harness (text overlap,
      # horizontal overflow, occluded controls) at phone + wide viewports.
      - run: npx playwright install --with-deps chromium
      - run: npm run ui-check

  coach:
    needs: [coach-verify, coach-fe-verify]
    uses: xinutec/pippijn/.github/workflows/docker.yml@main
    with:
      path: code/kubes/coach
      image: coach
    secrets:
      username: ${{ secrets.DOCKERHUB_USERNAME }}
      password: ${{ secrets.DOCKERHUB_PASSWORD }}

  # Message-archive viewer (Rust backend + Angular frontend) over the Signal +
  # Google Chat data in the signal DB. Gate on clippy + cargo test (no DB needed).
  messages-verify:
    runs-on: ubuntu-latest
    container: rust:1-bookworm
    # A throwaway MariaDB so the archive integration tests actually run in CI
    # (they seed + assert real queries; they skip when the env var is unset).
    services:
      mariadb:
        image: mariadb:11.8
        env:
          MARIADB_ROOT_PASSWORD: root
          MARIADB_DATABASE: messages_test
        options: >-
          --health-cmd="healthcheck.sh --connect --innodb_initialized"
          --health-interval=5s --health-timeout=5s --health-retries=10
    env:
      MESSAGES_TEST_DATABASE_URL: mysql://root:root@mariadb:3306/messages_test
    defaults:
      run:
        working-directory: code/kubes/messages
    steps:
      - uses: actions/checkout@v6
      - run: rustup component add clippy
      - run: cargo clippy --all-targets -- -D warnings
      - run: cargo test -- --test-threads=1

  # Frontend static analysis: angular-eslint (incl. forbidding inline templates)
  # + a production build, same convention as health/home.
  messages-fe-verify:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: code/kubes/messages/frontend
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
      - run: npm ci
      - run: npm run lint
      - run: npm test
      - run: npx ng build --configuration production
      # Real-browser render check: icon fonts actually load, no text overlaps.
      # Catches render bugs jsdom unit tests can't see (e.g. an icon font that
      # falls back to its ligature word). Serves the app via `ng serve`.
      - run: npx playwright install --with-deps chromium
      - run: npm run ui-check

  messages:
    needs: [messages-verify, messages-fe-verify]
    uses: xinutec/pippijn/.github/workflows/docker.yml@main
    with:
      path: code/kubes/messages
      image: messages
    secrets:
      username: ${{ secrets.DOCKERHUB_USERNAME }}
      password: ${{ secrets.DOCKERHUB_PASSWORD }}

  # Fleet monitoring platform (Rust backend + Angular frontend). Gate the image
  # on clippy + cargo test (DB round-trip tests run against a throwaway MariaDB).
  fleetwatch-verify:
    runs-on: ubuntu-latest
    container: rust:1-bookworm
    services:
      mariadb:
        image: mariadb:11.8
        env:
          MARIADB_ROOT_PASSWORD: root
          MARIADB_DATABASE: fleetwatch_test
        options: >-
          --health-cmd="healthcheck.sh --connect --innodb_initialized"
          --health-interval=5s --health-timeout=5s --health-retries=10
    env:
      FLEETWATCH_TEST_DATABASE_URL: mysql://root:root@mariadb:3306/fleetwatch_test
    defaults:
      run:
        working-directory: code/kubes/fleetwatch
    steps:
      - uses: actions/checkout@v6
      - run: rustup component add clippy
      - run: cargo clippy --all-targets -- -D warnings
      - run: cargo test -- --test-threads=1

  # Frontend static analysis: angular-eslint (incl. forbidding inline templates)
  # + unit tests + a production build, same convention as messages/health.
  fleetwatch-fe-verify:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: code/kubes/fleetwatch/frontend
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
      - run: npm ci
      - run: npm run lint
      - run: npm test
      - run: npx ng build --configuration production

  fleetwatch:
    needs: [fleetwatch-verify, fleetwatch-fe-verify]
    uses: xinutec/pippijn/.github/workflows/docker.yml@main
    with:
      path: code/kubes/fleetwatch
      image: fleetwatch
    secrets:
      username: ${{ secrets.DOCKERHUB_USERNAME }}
      password: ${{ secrets.DOCKERHUB_PASSWORD }}
