---
name: flake-update

# Keep each project's pinned nixpkgs (its flake.lock) current on a schedule, so
# `nix develop` / direnv toolchains don't silently drift years behind.
#
# Pushes straight to main — no PR. The flake.lock feeds ONLY the local dev shell:
# images build from node:24-alpine / rust:1-bookworm and CI verify uses
# setup-node, so a bump can't affect prod or CI, and there is nothing for a PR
# gate to validate. Worst case of a bad bump is a wonky local toolchain — revert
# the one lock line. build.yml ignores flake.lock, so this doesn't rebuild images.

on:
  schedule:
    - cron: "0 6 1 * *" # 06:00 UTC on the 1st of each month
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@main

      - name: Update every project's flake inputs
        run: |
          for p in health home life messages; do
            (cd "code/kubes/$p" && nix flake update)
          done

      - name: Commit & push if any lock changed
        run: |
          if git diff --quiet -- code/kubes/*/flake.lock; then
            echo "no lock changes — nothing to do"
            exit 0
          fi
          git config user.name "flake-update"
          git config user.email "actions@github.com"
          git add code/kubes/*/flake.lock
          git commit -m "bump flake locks (monthly)"
          git push
